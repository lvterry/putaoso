name: Putaoso
options:
  bundleIdPrefix: com.putaoso
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Putaoso:
    type: application
    platform: iOS
    sources:
      - path: Putaoso/Sources
      - path: Putaoso/Resources
        buildPhase: resources
      - path: ../public/illustrations
        buildPhase: resources
        type: folder
    preBuildScripts:
      - name: Export Variety Data
        script: |
          cd "$SRCROOT/.."
          /usr/bin/env node scripts/export-ios-data.mjs
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.putaoso.app
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: 葡萄搜
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

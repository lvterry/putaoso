<svg role="img" aria-label="Tempranillo illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="tp-hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#2a1a14" stroke-width="0.7"/>
        </pattern>
        <pattern id="tp-cross" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="#2a1a14" stroke-width="0.8"/>
          <line x1="0" y1="0" x2="5" y2="0" stroke="#2a1a14" stroke-width="0.8"/>
        </pattern>
        <radialGradient id="tp-vignette" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#c8a878" stop-opacity="0"/>
          <stop offset="100%" stop-color="#3a2010" stop-opacity="0.85"/>
        </radialGradient>
      </defs>

      <!-- aged tobacco-colored paper -->
      <rect width="1600" height="900" fill="#c8a878"/>

      <!-- dark vignette closing in -->
      <rect width="1600" height="900" fill="url(#tp-vignette)"/>

      <!-- top sky band: blank cream -->
      <rect x="0" y="0" width="1600" height="380" fill="#d8b888" opacity="0.5"/>

      <!-- horizon line: a far meseta plateau -->
      <path d="M 0 380 L 1600 380 L 1600 420 L 0 420 Z" fill="url(#tp-hatch)" opacity="0.5"/>

      <!-- middle ground hatching -->
      <path d="M 0 420 L 1600 420 L 1600 600 L 0 600 Z" fill="url(#tp-hatch)" opacity="0.75"/>

      <!-- foreground crosshatch (deep shadow) -->
      <path d="M 0 600 L 1600 600 L 1600 900 L 0 900 Z" fill="url(#tp-cross)" opacity="0.95"/>

      <!-- THE WINDMILL silhouette (Don Quixote / Castilla) -->
      <g transform="translate(540, 460)" fill="#1a0e08">
        <!-- conical body -->
        <path d="M -60 -10 L 60 -10 L 50 140 L -50 140 Z"/>
        <!-- conical roof -->
        <path d="M -64 -10 L 0 -90 L 64 -10 Z"/>
        <!-- door -->
        <rect x="-12" y="100" width="24" height="40" fill="#5a2818"/>
        <!-- center hub -->
        <circle cx="0" cy="-12" r="6"/>
        <!-- four sails -->
        <g stroke="#1a0e08" stroke-width="6">
          <line x1="0" y1="-12" x2="-110" y2="-130"/>
          <line x1="0" y1="-12" x2="130" y2="-110"/>
          <line x1="0" y1="-12" x2="-130" y2="100"/>
          <line x1="0" y1="-12" x2="110" y2="120"/>
        </g>
        <!-- sail blades (canvas) -->
        <g fill="#1a0e08">
          <path d="M -110 -130 L -76 -135 L -22 -32 L -36 -22 Z"/>
          <path d="M 130 -110 L 132 -76 L 32 -16 L 18 -28 Z"/>
          <path d="M -130 100 L -132 66 L -32 6 L -18 18 Z"/>
          <path d="M 110 120 L 76 124 L 22 22 L 36 12 Z"/>
        </g>
        <!-- small windows -->
        <rect x="-6" y="40" width="12" height="14" fill="#5a2818"/>
        <rect x="-6" y="70" width="12" height="14" fill="#5a2818"/>
      </g>

      <!-- A lone rider on horseback far right, very small (Quixote tilting?) -->
      <g transform="translate(1240, 580)" fill="#1a0e08">
        <!-- horse body -->
        <ellipse cx="0" cy="0" rx="34" ry="10"/>
        <!-- legs -->
        <line x1="-20" y1="6" x2="-22" y2="34" stroke="#1a0e08" stroke-width="3"/>
        <line x1="-10" y1="6" x2="-8" y2="34" stroke="#1a0e08" stroke-width="3"/>
        <line x1="10" y1="6" x2="14" y2="34" stroke="#1a0e08" stroke-width="3"/>
        <line x1="22" y1="6" x2="26" y2="34" stroke="#1a0e08" stroke-width="3"/>
        <!-- neck and head -->
        <path d="M 28 -2 L 42 -16 L 50 -14 L 46 -2 Z"/>
        <!-- rider body -->
        <path d="M -10 -22 L 6 -22 L 4 -2 L -6 -2 Z"/>
        <!-- rider head -->
        <circle cx="-2" cy="-30" r="6"/>
        <!-- lance pointing up -->
        <line x1="-2" y1="-30" x2="-32" y2="-100" stroke="#1a0e08" stroke-width="2.5"/>
        <!-- pennant on lance -->
        <path d="M -32 -100 L -22 -94 L -32 -90 Z"/>
        <!-- tail -->
        <path d="M -34 -2 L -50 -6 L -52 4 L -36 6 Z"/>
      </g>

      <!-- low clouds streaks -->
      <g stroke="#2a1a14" stroke-width="1" fill="none" opacity="0.6">
        <path d="M 100 180 Q 200 174 300 180"/>
        <path d="M 380 200 Q 480 194 580 200"/>
        <path d="M 700 170 Q 800 164 900 170"/>
        <path d="M 1000 200 Q 1100 194 1200 200"/>
        <path d="M 1280 178 Q 1380 172 1480 178"/>
      </g>

      <!-- crows in the sky -->
      <g fill="#1a0e08">
        <path d="M 360 240 q 10 -8 20 0 q 10 -8 20 0 q -10 6 -20 4 q -10 2 -20 -4"/>
        <path d="M 460 220 q 8 -6 16 0 q 8 -6 16 0 q -8 5 -16 3 q -8 2 -16 -3"/>
        <path d="M 280 280 q 6 -5 12 0 q 6 -5 12 0 q -6 4 -12 2 q -6 2 -12 -2"/>
        <path d="M 1080 260 q 10 -8 20 0 q 10 -8 20 0 q -10 6 -20 4 q -10 2 -20 -4"/>
        <path d="M 1200 230 q 8 -6 16 0 q 8 -6 16 0 q -8 5 -16 3 q -8 2 -16 -3"/>
      </g>

      <!-- engraved frame -->
      <rect x="80" y="80" width="1440" height="740" fill="none" stroke="#2a1a14" stroke-width="1.5"/>
      <rect x="96" y="96" width="1408" height="708" fill="none" stroke="#2a1a14" stroke-width="0.5"/>

      <!-- engraved title bottom -->
      <text x="800" y="858" text-anchor="middle"
            font-family="'Trajan Pro', Georgia, serif"
            font-size="22" letter-spacing="0.4em" fill="#2a1a14">— LA MANCHA · TEMPRANILLO —</text>

      <!-- plate annotation upper left -->
      <text x="110" y="118" font-family="Georgia, serif" font-style="italic"
            font-size="13" fill="#2a1a14">aquatint, c. MDCCXCVIII</text>
    </svg>

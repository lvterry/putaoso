<svg role="img" aria-label="Beibinghong illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <!-- deep ink black -->
      <rect width="1600" height="900" fill="#080a0e"/>

      <!-- subtle field of stars -->
      <g fill="#e0e8f0">
        <circle cx="120" cy="80" r="0.8"/><circle cx="280" cy="60" r="0.6"/>
        <circle cx="420" cy="120" r="0.8"/><circle cx="600" cy="50" r="0.5"/>
        <circle cx="780" cy="90" r="0.7"/><circle cx="940" cy="60" r="0.5"/>
        <circle cx="1120" cy="100" r="0.8"/><circle cx="1280" cy="60" r="0.5"/>
        <circle cx="1440" cy="90" r="0.7"/><circle cx="180" cy="180" r="0.6"/>
        <circle cx="360" cy="220" r="0.5"/><circle cx="520" cy="200" r="0.8"/>
        <circle cx="680" cy="230" r="0.6"/><circle cx="860" cy="200" r="0.5"/>
        <circle cx="1020" cy="220" r="0.7"/><circle cx="1200" cy="200" r="0.8"/>
        <circle cx="1380" cy="220" r="0.5"/>
        <circle cx="60" cy="300" r="0.7"/><circle cx="240" cy="340" r="0.5"/>
        <circle cx="440" cy="300" r="0.8"/><circle cx="620" cy="340" r="0.5"/>
        <circle cx="800" cy="300" r="0.7"/><circle cx="980" cy="340" r="0.5"/>
        <circle cx="1160" cy="300" r="0.6"/><circle cx="1340" cy="340" r="0.8"/>
        <circle cx="1520" cy="300" r="0.5"/>
      </g>

      <!-- a single brighter star (north star) -->
      <g transform="translate(800, 220)" fill="#f0e8d4">
        <circle r="2.5"/>
        <line x1="-12" y1="0" x2="12" y2="0" stroke="#f0e8d4" stroke-width="0.5"/>
        <line x1="0" y1="-12" x2="0" y2="12" stroke="#f0e8d4" stroke-width="0.5"/>
      </g>

      <!-- arctic horizon: a single faint white line -->
      <line x1="0" y1="640" x2="1600" y2="640" stroke="#5a6678" stroke-width="0.6" opacity="0.7"/>

      <!-- snow ground: pure white field -->
      <rect x="0" y="640" width="1600" height="260" fill="#f0e8d4"/>

      <!-- tiny scattered snow texture marks on dark sky -->
      <g fill="#f0e8d4" opacity="0.5">
        <circle cx="100" cy="440" r="0.8"/><circle cx="320" cy="480" r="0.6"/>
        <circle cx="540" cy="450" r="0.8"/><circle cx="760" cy="490" r="0.5"/>
        <circle cx="980" cy="460" r="0.7"/><circle cx="1200" cy="490" r="0.6"/>
        <circle cx="1420" cy="450" r="0.7"/>
        <circle cx="220" cy="540" r="0.7"/><circle cx="440" cy="580" r="0.5"/>
        <circle cx="660" cy="560" r="0.6"/><circle cx="880" cy="600" r="0.7"/>
        <circle cx="1100" cy="570" r="0.5"/><circle cx="1320" cy="600" r="0.6"/>
        <circle cx="80" cy="600" r="0.7"/><circle cx="1500" cy="580" r="0.6"/>
      </g>

      <!-- THE TREE: a single bare frozen vine (small, isolated) -->
      <g transform="translate(820, 640)" stroke="#080a0e" stroke-linecap="round" fill="none">
        <!-- trunk -->
        <path d="M 0 0 L -2 -120" stroke-width="3.5"/>
        <!-- branches -->
        <path d="M -2 -40 L -50 -90" stroke-width="2.5"/>
        <path d="M -50 -90 L -90 -100" stroke-width="2"/>
        <path d="M -50 -90 L -70 -130" stroke-width="1.8"/>
        <path d="M -2 -60 L 40 -110" stroke-width="2.5"/>
        <path d="M 40 -110 L 80 -120" stroke-width="2"/>
        <path d="M 40 -110 L 60 -150" stroke-width="1.8"/>
        <path d="M -2 -90 L -30 -160" stroke-width="2"/>
        <path d="M -2 -90 L 20 -150" stroke-width="2"/>
        <path d="M -2 -100 L -50 -180" stroke-width="1.5"/>
        <path d="M -2 -100 L 40 -180" stroke-width="1.5"/>
        <!-- a few frozen berries -->
        <circle cx="-50" cy="-90" r="3" fill="#3a0810"/>
        <circle cx="40" cy="-110" r="3" fill="#3a0810"/>
        <circle cx="-30" cy="-160" r="2.5" fill="#3a0810"/>
        <circle cx="-2" cy="-120" r="2.5" fill="#3a0810"/>
        <circle cx="20" cy="-150" r="2.5" fill="#3a0810"/>
      </g>

      <!-- tree shadow on snow (very long, very pale) -->
      <g opacity="0.25">
        <path d="M 820 640
                 L 920 880
                 L 924 880
                 L 824 640 Z" fill="#5a6678"/>
        <path d="M 770 640 L 870 880 L 874 880 L 774 640 Z" fill="#5a6678"/>
        <path d="M 860 640 L 960 880 L 964 880 L 864 640 Z" fill="#5a6678"/>
      </g>

      <!-- thermometer reading bottom left, tiny mono type -->
      <g font-family="'IBM Plex Mono', 'SF Mono', monospace" fill="#5a6678">
        <text x="80" y="780" font-size="13" letter-spacing="0.2em">N 41° 43′</text>
        <text x="80" y="800" font-size="13" letter-spacing="0.2em">E 125° 56′</text>
        <text x="80" y="836" font-size="36" letter-spacing="0.04em" fill="#3a0810" font-weight="700">−42°C</text>
      </g>

      <!-- title bottom right -->
      <g font-family="'Songti SC', serif" fill="#3a0810">
        <text x="1520" y="780" text-anchor="end" font-size="32"
              letter-spacing="0.2em" font-weight="500">北冰红</text>
        <text x="1520" y="808" text-anchor="end" font-family="Georgia, serif"
              font-size="13" letter-spacing="0.3em" font-style="italic" fill="#5a6678">Beibinghong</text>
        <text x="1520" y="832" text-anchor="end" font-family="Georgia, serif"
              font-size="11" letter-spacing="0.4em" fill="#5a6678">— TONGHUA · JILIN —</text>
      </g>

      <!-- A small subtle red dot in the white expanse -->
      <circle cx="400" cy="780" r="4" fill="#a8182a"/>
      <circle cx="400" cy="780" r="14" fill="none" stroke="#a8182a" stroke-width="0.4" opacity="0.5"/>
    </svg>

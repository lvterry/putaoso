<svg role="img" aria-label="Moscato illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mo-sky" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8eee4"/>
      <stop offset="100%" stop-color="#f0dcd0"/>
    </radialGradient>
    <pattern id="mo-floral" patternUnits="userSpaceOnUse" width="80" height="80">
      <path d="M 40 8 Q 52 20 40 32 Q 28 20 40 8 Z" fill="#f0c0c8" opacity="0.15"/>
      <circle cx="40" cy="20" r="1.5" fill="#f0a0a0" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- pale pink background -->
  <rect width="1600" height="900" fill="url(#mo-sky)"/>
  <rect width="1600" height="900" fill="url(#mo-floral)"/>

  <!-- decorative oval cartouche (Rococo frame) -->
  <g transform="translate(800, 420)">
    <!-- elaborate floral wreath frame -->
    <ellipse cx="0" cy="0" rx="460" ry="340" fill="none" stroke="#d89098" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="440" ry="320" fill="none" stroke="#e0a0a8" stroke-width="0.6" opacity="0.4"/>

    <!-- C-curves and S-curves (rocaille ornamentation) -->
    <g fill="none" stroke="#d0a0a8" stroke-width="2" opacity="0.7">
      <!-- top C-scrolls -->
      <path d="M -280 -200 Q -320 -160 -280 -120 Q -240 -80 -200 -100"
            stroke-width="2.5"/>
      <path d="M 280 -200 Q 320 -160 280 -120 Q 240 -80 200 -100"
            stroke-width="2.5"/>
      <!-- bottom C-scrolls -->
      <path d="M -260 200 Q -300 160 -260 120 Q -220 80 -180 100"
            stroke-width="2.5"/>
      <path d="M 260 200 Q 300 160 260 120 Q 220 80 180 100"
            stroke-width="2.5"/>
      <!-- side scrolls -->
      <path d="M -380 -40 Q -420 0 -380 40 Q -340 80 -320 40"
            stroke-width="2"/>
      <path d="M 380 -40 Q 420 0 380 40 Q 340 80 320 40"
            stroke-width="2"/>
    </g>

    <!-- FLORAL WREATH -->
    <g fill="#e0a8b0" opacity="0.7">
      <!-- top flowers -->
      <circle cx="-120" cy="-220" r="14"/><circle cx="-100" cy="-230" r="10"/>
      <circle cx="100" cy="-230" r="10"/><circle cx="120" cy="-220" r="14"/>
      <!-- side flowers -->
      <circle cx="-280" cy="-40" r="12"/><circle cx="-280" cy="40" r="12"/>
      <circle cx="280" cy="-40" r="12"/><circle cx="280" cy="40" r="12"/>
      <!-- bottom flowers -->
      <circle cx="-100" cy="220" r="10"/><circle cx="100" cy="220" r="10"/>
      <circle cx="-120" cy="210" r="14"/><circle cx="120" cy="210" r="14"/>
    </g>

    <!-- inner: PEACH + BUBBLES -->
    <g transform="translate(0, -30)">
      <!-- peach -->
      <path d="M -40 0 C -50 -40 -10 -80 0 -80 C 10 -80 50 -40 40 0
               C 30 50 -30 50 -40 0 Z"
            fill="#f0c898" stroke="#d8a078" stroke-width="1.5"/>
      <path d="M -40 0 C -30 20 -10 28 0 30 C 10 28 30 20 40 0"
            fill="#f8d8b0" opacity="0.5"/>
      <!-- peach stem -->
      <path d="M 0 -80 Q 2 -92 8 -96" fill="none" stroke="#6a7838" stroke-width="2"/>
      <!-- peach leaf -->
      <path d="M 4 -88 Q 20 -100 24 -88 Q 14 -80 4 -88 Z" fill="#6a7838"/>
    </g>

    <!-- BUBBLES (sparkling) -->
    <g fill="#f0e8e0" stroke="#d0a8b0" stroke-width="0.8" opacity="0.8">
      <circle cx="-120" cy="-100" r="8"/>
      <circle cx="-100" cy="-120" r="5"/>
      <circle cx="-140" cy="-130" r="4"/>
      <circle cx="90" cy="-90" r="7"/>
      <circle cx="120" cy="-110" r="5"/>
      <circle cx="100" cy="-130" r="4"/>
      <circle cx="-100" cy="80" r="6"/>
      <circle cx="-120" cy="60" r="4"/>
      <circle cx="110" cy="70" r="5"/>
      <circle cx="130" cy="90" r="3"/>
      <circle cx="80" cy="100" r="4"/>
      <circle cx="-60" cy="110" r="3"/>
      <circle cx="-150" cy="40" r="3"/>
      <circle cx="150" cy="-50" r="4"/>
      <circle cx="60" cy="-120" r="3"/>
    </g>

    <!-- highlight on bubbles -->
    <g fill="#fff" opacity="0.6">
      <circle cx="-122" cy="-102" r="2"/>
      <circle cx="88" cy="-92" r="2"/>
      <circle cx="-102" cy="-82" r="1.5"/>
    </g>
  </g>

  <!-- graceful trailing vines at sides -->
  <g fill="none" stroke="#a8a060" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <!-- left vine -->
    <path d="M 180 100 C 140 180 200 280 260 350 C 300 400 280 480 240 540"/>
    <path d="M 220 240 Q 180 220 160 240" stroke-width="1.5"/>
    <path d="M 250 300 Q 280 280 300 300" stroke-width="1.5"/>
    <path d="M 260 420 Q 220 400 200 420" stroke-width="1.5"/>

    <!-- right vine -->
    <path d="M 1420 120 C 1460 200 1400 300 1340 370 C 1300 420 1320 500 1360 560"/>
    <path d="M 1380 260 Q 1420 240 1440 260" stroke-width="1.5"/>
    <path d="M 1350 340 Q 1310 320 1290 340" stroke-width="1.5"/>
    <path d="M 1340 440 Q 1380 420 1400 440" stroke-width="1.5"/>
  </g>

  <!-- small leaves on vines -->
  <g fill="#889048" opacity="0.5">
    <ellipse cx="160" cy="240" rx="10" ry="5" transform="rotate(-30 160 240)"/>
    <ellipse cx="300" cy="300" rx="10" ry="5" transform="rotate(20 300 300)"/>
    <ellipse cx="200" cy="420" rx="10" ry="5" transform="rotate(-15 200 420)"/>
    <ellipse cx="1440" cy="260" rx="10" ry="5" transform="rotate(30 1440 260)"/>
    <ellipse cx="1290" cy="340" rx="10" ry="5" transform="rotate(-20 1290 340)"/>
    <ellipse cx="1400" cy="440" rx="10" ry="5" transform="rotate(15 1400 440)"/>
  </g>

  <!-- title (elegant serif / classic) -->
  <text x="800" y="120" text-anchor="middle" font-family="Georgia, serif"
        font-size="48" font-weight="700" font-style="italic" letter-spacing="0.12em" fill="#7a3040">Moscato</text>
  <text x="800" y="155" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" font-style="italic" letter-spacing="0.35em" fill="#7a3040" opacity="0.7">d'Asti</text>

  <!-- bottom cartouche title -->
  <g transform="translate(800, 780)">
    <path d="M -200 0 Q -220 -15 -200 -30 L 200 -30 Q 220 -15 200 0 Z"
          fill="#e0b0b8" opacity="0.4"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia, serif"
          font-size="12" font-style="italic" letter-spacing="0.4em" fill="#7a3040" opacity="0.7">pesca · fiori · bollicine</text>
  </g>

  <!-- small decorative rose motifs -->
  <g fill="#d0a0a8" opacity="0.3">
    <path d="M 100 780 Q 110 770 120 780 Q 110 790 100 780 Z"/>
    <path d="M 1480 780 Q 1490 770 1500 780 Q 1490 790 1480 780 Z"/>
  </g>
</svg>

<svg role="img" aria-label="Dolcetto illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="dc-sky" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f0e4d8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d8c8b8" stop-opacity="1"/>
    </radialGradient>
    <filter id="dc-water" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="8"/>
    </filter>
    <filter id="dc-water-light" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="5"/>
    </filter>
  </defs>

  <!-- wet-in-wet watercolor background -->
  <rect width="1600" height="900" fill="#f0e4d8"/>

  <!-- sky wash (warm ivory bleeding) -->
  <ellipse cx="800" cy="200" rx="700" ry="300" fill="#f5ecd8" opacity="0.7" filter="url(#dc-water)"/>

  <!-- distant hills (soft purple-grey wash) -->
  <path d="M -100 380 Q 200 340 500 370 Q 800 330 1100 360 Q 1400 340 1700 380 L 1700 500 L -100 500 Z"
        fill="#b8a0a0" opacity="0.35" filter="url(#dc-water)"/>

  <!-- mid hills (soft rose-lavender) -->
  <path d="M -100 460 Q 300 420 700 450 Q 1100 420 1700 460 L 1700 580 L -100 580 Z"
        fill="#c89098" opacity="0.4" filter="url(#dc-water)"/>

  <!-- foreground hills (deeper violet-blue) -->
  <path d="M -100 540 Q 200 500 500 530 Q 800 490 1200 530 Q 1400 510 1700 540 L 1700 700 L -100 700 Z"
        fill="#907088" opacity="0.45" filter="url(#dc-water)"/>

  <!-- softening wash overlay (blending the hills) -->
  <rect x="0" y="350" width="1600" height="200" fill="#f0e4d8" opacity="0.3" filter="url(#dc-water-light)"/>

  <!-- A DOLCETTO GRAPE CLUSTER (loose watercolor shapes) -->
  <g transform="translate(500, 280)" opacity="0.85">
    <!-- grapes as soft circular washes -->
    <g fill="#5a2848">
      <circle cx="0" cy="-30" r="18" filter="url(#dc-water-light)"/>
      <circle cx="-22" cy="-12" r="18" filter="url(#dc-water-light)"/>
      <circle cx="22" cy="-12" r="18" filter="url(#dc-water-light)"/>
      <circle cx="-38" cy="8" r="18" filter="url(#dc-water-light)"/>
      <circle cx="0" cy="8" r="18" filter="url(#dc-water-light)"/>
      <circle cx="38" cy="8" r="18" filter="url(#dc-water-light)"/>
      <circle cx="-22" cy="28" r="18" filter="url(#dc-water-light)"/>
      <circle cx="22" cy="28" r="18" filter="url(#dc-water-light)"/>
      <circle cx="0" cy="48" r="18" filter="url(#dc-water-light)"/>
    </g>
    <!-- color wash variation (overlay of brighter purple) -->
    <g fill="#784878" opacity="0.4">
      <circle cx="-4" cy="-34" r="10" filter="url(#dc-water-light)"/>
      <circle cx="-26" cy="-16" r="10" filter="url(#dc-water-light)"/>
      <circle cx="18" cy="-16" r="10" filter="url(#dc-water-light)"/>
      <circle cx="-42" cy="4" r="10" filter="url(#dc-water-light)"/>
      <circle cx="-4" cy="4" r="10" filter="url(#dc-water-light)"/>
      <circle cx="34" cy="4" r="10" filter="url(#dc-water-light)"/>
    </g>
    <!-- leaf washes -->
    <path d="M -12 -50 Q -40 -80 -60 -50 Q -30 -30 -12 -50 Z"
          fill="#5a7840" opacity="0.6" filter="url(#dc-water-light)"/>
    <path d="M 12 -50 Q 40 -80 60 -50 Q 30 -30 12 -50 Z"
          fill="#5a7840" opacity="0.6" filter="url(#dc-water-light)"/>
    <!-- stem -->
    <path d="M 0 -48 Q 0 -70 -4 -90"
          fill="none" stroke="#4a6830" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- loose paint splatters -->
  <g fill="#5a2848" opacity="0.15" filter="url(#dc-water-light)">
    <circle cx="680" cy="420" r="6"/>
    <circle cx="700" cy="440" r="4"/>
    <circle cx="340" cy="300" r="5"/>
    <circle cx="800" cy="500" r="7"/>
    <circle cx="1200" cy="460" r="4"/>
  </g>

  <!-- foreground field wash -->
  <path d="M -100 680 Q 400 640 900 670 Q 1300 630 1700 680 L 1700 900 L -100 900 Z"
        fill="#a08878" opacity="0.3" filter="url(#dc-water)"/>

  <!-- text, written in ink over wash -->
  <g font-family="Georgia, serif" fill="#2a1a14" opacity="0.85">
    <text x="120" y="150" font-size="54" font-weight="700" font-style="italic"
          letter-spacing="0.04em">Dolcetto</text>
    <text x="124" y="192" font-size="16" font-style="italic" letter-spacing="0.3em" opacity="0.7">
      dolce · Dogliani · Piemonte
    </text>
  </g>

  <!-- small ink annotation -->
  <text x="120" y="800" font-family="Georgia, serif" font-size="12" font-style="italic"
        fill="#2a1a14" opacity="0.5">washes on paper · Langhe · MMXXVI</text>

  <!-- bottom right, a small ink stamp -->
  <g transform="translate(1420, 740)" fill="none" stroke="#2a1a14" stroke-width="1.5" opacity="0.6">
    <rect x="0" y="0" width="80" height="80" rx="3"/>
    <text x="40" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2a1a14" stroke="none">D</text>
    <text x="40" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2a1a14" stroke="none" opacity="0.7">dolce</text>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#2a1a14" stroke-width="0.5"/>
  </g>

  <!-- drip effect at bottom -->
  <g fill="#a08878" opacity="0.2">
    <path d="M 200 700 Q 206 730 200 750 Q 194 730 200 700 Z"/>
    <path d="M 800 680 Q 806 720 800 740 Q 794 720 800 680 Z"/>
    <path d="M 1200 690 Q 1206 725 1200 745 Q 1194 725 1200 690 Z"/>
  </g>
</svg>

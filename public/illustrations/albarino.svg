<svg role="img" aria-label="Albarino illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="ab-lino" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="4" cy="4" r="0.3" fill="#1a1612" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- cream paper -->
  <rect width="1600" height="900" fill="#f0ead8"/>
  <rect width="1600" height="900" fill="url(#ab-lino)"/>

  <!-- sky (upper half left as paper white) -->

  <!-- SEA: bold black linocut waves -->
  <g fill="none" stroke="#1a1612" stroke-linecap="round" stroke-linejoin="round">

    <!-- wave row 1 (far) -->
    <path d="M 0 320 Q 60 300 120 320 T 240 320 T 360 320 T 480 320 T 600 320
             T 720 320 T 840 320 T 960 320 T 1080 320 T 1200 320 T 1320 320
             T 1440 320 T 1560 320 L 1600 320"
          stroke-width="2.5" fill="#1a1612" opacity="0.6"/>
    <path d="M 0 320 Q 60 300 120 320 T 240 320 T 360 320 T 480 320 T 600 320
             T 720 320 T 840 320 T 960 320 T 1080 320 T 1200 320 T 1320 320
             T 1440 320 T 1560 320 L 1600 320"
          stroke-width="2.5" fill="#1a1612" opacity="0.6"
          transform="translate(30, 5)"/>

    <!-- wave row 2 (mid) -->
    <path d="M 0 400 Q 80 370 160 400 T 320 400 T 480 400 T 640 400 T 800 400
             T 960 400 T 1120 400 T 1280 400 T 1440 400 T 1600 400"
          stroke-width="3" fill="#1a1612"/>
    <path d="M 0 400 Q 80 370 160 400 T 320 400 T 480 400 T 640 400 T 800 400
             T 960 400 T 1120 400 T 1280 400 T 1440 400 T 1600 400"
          stroke-width="3" fill="#1a1612"
          transform="translate(20, 8)"/>

    <!-- wave row 3 (foreground, big) -->
    <path d="M 0 510 Q 100 460 200 510 T 400 510 T 600 510 T 800 510 T 1000 510
             T 1200 510 T 1400 510 T 1600 510"
          stroke-width="4" fill="#1a1612"/>
    <path d="M 0 510 Q 100 460 200 510 T 400 510 T 600 510 T 800 510 T 1000 510
             T 1200 510 T 1400 510 T 1600 510"
          stroke-width="4" fill="#1a1612"
          transform="translate(40, 12)"/>

    <!-- wave row 4 (closest, breaking) -->
    <path d="M 0 630 Q 120 570 240 630 T 480 630 T 720 630 T 960 630 T 1200 630
             T 1440 630 L 1600 630"
          stroke-width="4.5" fill="#1a1612"/>
    <path d="M 0 630 Q 120 570 240 630 T 480 630 T 720 630 T 960 630 T 1200 630
             T 1440 630 L 1600 630"
          stroke-width="4.5" fill="#1a1612"
          transform="translate(30, 14)"/>
  </g>

  <!-- SCALLOP SHELL (vieira) -- Galicia symbol -->
  <g transform="translate(640, 240)">
    <path d="M 0 -80
             Q 60 -80 70 -40
             Q 80 10 50 60
             Q 20 90 0 100
             Q -20 90 -50 60
             Q -80 10 -70 -40
             Q -60 -80 0 -80 Z"
          fill="none" stroke="#1a1612" stroke-width="3.5"/>
    <!-- shell ribs -->
    <g stroke="#1a1612" stroke-width="1.5" fill="none">
      <path d="M 0 -80 Q 0 10 0 100"/>
      <path d="M -20 -76 Q -20 10 -20 92" opacity="0.7"/>
      <path d="M 20 -76 Q 20 10 20 92" opacity="0.7"/>
      <path d="M -40 -62 Q -38 10 -38 72" opacity="0.6"/>
      <path d="M 40 -62 Q 38 10 38 72" opacity="0.6"/>
      <path d="M -58 -36 Q -55 10 -52 42" opacity="0.5"/>
      <path d="M 58 -36 Q 55 10 52 42" opacity="0.5"/>
    </g>
    <!-- hinge -->
    <path d="M -12 100 Q 0 110 12 100" fill="none" stroke="#1a1612" stroke-width="2.5"/>
  </g>

  <!-- spray/splashes (white negative space cuts in black) -->
  <g fill="#f0ead8" stroke="#1a1612" stroke-width="1.5">
    <circle cx="800" cy="460" r="6"/>
    <circle cx="830" cy="440" r="4"/>
    <circle cx="770" cy="435" r="5"/>
    <circle cx="840" cy="470" r="3"/>
    <circle cx="750" cy="460" r="4"/>
  </g>

  <!-- grape cluster (raised, solid black with white cutout) -->
  <g transform="translate(980, 360)">
    <g fill="#1a1612">
      <circle cx="0" cy="-24" r="14"/>
      <circle cx="-16" cy="-10" r="14"/>
      <circle cx="16" cy="-10" r="14"/>
      <circle cx="-28" cy="6" r="14"/>
      <circle cx="0" cy="6" r="14"/>
      <circle cx="28" cy="6" r="14"/>
      <circle cx="-16" cy="22" r="14"/>
      <circle cx="16" cy="22" r="14"/>
      <circle cx="0" cy="38" r="14"/>
    </g>
    <!-- white cutout highlights -->
    <g fill="#f0ead8">
      <circle cx="-4" cy="-28" r="4"/>
      <circle cx="-20" cy="-14" r="4"/>
      <circle cx="12" cy="-14" r="4"/>
      <circle cx="-32" cy="2" r="4"/>
      <circle cx="-4" cy="2" r="4"/>
      <circle cx="24" cy="2" r="4"/>
      <circle cx="-20" cy="18" r="4"/>
      <circle cx="12" cy="18" r="4"/>
      <circle cx="-4" cy="34" r="4"/>
    </g>
    <!-- leaf -->
    <path d="M -8 -40 Q -40 -60 -50 -30 Q -30 -20 -8 -40 Z"
          fill="#1a1612"/>
    <path d="M 8 -40 Q 40 -60 50 -30 Q 30 -20 8 -40 Z"
          fill="#1a1612"/>
  </g>

  <!-- TITLE: hand-carved linocut lettering -->
  <text x="120" y="160" font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-size="72" font-weight="900" letter-spacing="-0.02em" fill="#1a1612">ALBARIÑO</text>
  <text x="122" y="200" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="700" letter-spacing="0.42em" fill="#1a1612">RÍAS BAIXAS · GALICIA</text>

  <!-- bottom band -->
  <rect x="0" y="780" width="1600" height="120" fill="#1a1612"/>
  <text x="120" y="840" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="400" letter-spacing="0.3em" fill="#f0ead8">MARISCO · BRISA · GRANITO</text>
  <text x="1480" y="840" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" letter-spacing="0.2em" fill="#f0ead8" opacity="0.7">Rías Baixas DO · MMXXVI</text>
</svg>

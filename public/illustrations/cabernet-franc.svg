<svg role="img" aria-label="Cabernet Franc illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="cf-paper" patternUnits="userSpaceOnUse" width="40" height="40">
          <rect width="40" height="40" fill="#f0ebe0"/>
          <circle cx="8" cy="15" r="0.4" fill="#a89888" opacity="0.4"/>
          <circle cx="30" cy="28" r="0.3" fill="#a89888" opacity="0.4"/>
          <circle cx="20" cy="38" r="0.4" fill="#a89888" opacity="0.4"/>
        </pattern>
      </defs>

      <!-- sketchbook paper -->
      <rect width="1600" height="900" fill="url(#cf-paper)"/>

      <!-- a single faint margin line -->
      <line x1="180" y1="80" x2="180" y2="820" stroke="#c89878" stroke-width="0.8" opacity="0.7"/>

      <!-- horizontal ruled lines (faint) -->
      <g stroke="#8898a8" stroke-width="0.4" opacity="0.3">
        <line x1="60" y1="160" x2="1540" y2="160"/>
        <line x1="60" y1="200" x2="1540" y2="200"/>
        <line x1="60" y1="240" x2="1540" y2="240"/>
        <line x1="60" y1="280" x2="1540" y2="280"/>
        <line x1="60" y1="320" x2="1540" y2="320"/>
        <line x1="60" y1="360" x2="1540" y2="360"/>
        <line x1="60" y1="400" x2="1540" y2="400"/>
        <line x1="60" y1="440" x2="1540" y2="440"/>
        <line x1="60" y1="480" x2="1540" y2="480"/>
        <line x1="60" y1="520" x2="1540" y2="520"/>
        <line x1="60" y1="560" x2="1540" y2="560"/>
        <line x1="60" y1="600" x2="1540" y2="600"/>
        <line x1="60" y1="640" x2="1540" y2="640"/>
        <line x1="60" y1="680" x2="1540" y2="680"/>
        <line x1="60" y1="720" x2="1540" y2="720"/>
        <line x1="60" y1="760" x2="1540" y2="760"/>
      </g>

      <!-- THE SKETCH: a wine glass, very loose pencil contour -->
      <g fill="none" stroke="#2a2820" stroke-width="1.4" stroke-linecap="round" opacity="0.92">
        <!-- glass bowl: imperfect ellipse -->
        <path d="M 580 360
                 C 580 330 620 318 720 318
                 C 820 318 860 330 860 360
                 L 860 460
                 C 860 530 820 580 720 580
                 C 620 580 580 530 580 460 Z"/>
        <!-- rim ellipse -->
        <ellipse cx="720" cy="360" rx="140" ry="20"/>
        <!-- wine surface ellipse -->
        <ellipse cx="720" cy="410" rx="128" ry="14"/>
        <!-- stem -->
        <line x1="720" y1="582" x2="724" y2="720"/>
        <!-- base -->
        <ellipse cx="722" cy="720" rx="90" ry="10"/>
        <ellipse cx="722" cy="718" rx="90" ry="8" stroke-opacity="0.3"/>
        <!-- a soft highlight curve inside bowl -->
        <path d="M 612 400 Q 620 460 660 540" stroke-width="0.8"/>
      </g>

      <!-- gentle pencil shading on bowl -->
      <g stroke="#2a2820" stroke-width="0.5" opacity="0.3">
        <line x1="780" y1="420" x2="836" y2="460"/>
        <line x1="784" y1="440" x2="838" y2="478"/>
        <line x1="788" y1="460" x2="836" y2="495"/>
        <line x1="790" y1="480" x2="834" y2="510"/>
        <line x1="792" y1="500" x2="828" y2="524"/>
        <line x1="794" y1="520" x2="822" y2="538"/>
        <line x1="794" y1="540" x2="814" y2="552"/>
      </g>

      <!-- wine in glass: light wash with pencil scribble -->
      <g stroke="#7a2a30" stroke-width="0.4" opacity="0.65">
        <line x1="600" y1="430" x2="838" y2="430"/>
        <line x1="600" y1="438" x2="838" y2="438"/>
        <line x1="602" y1="446" x2="836" y2="446"/>
        <line x1="604" y1="454" x2="834" y2="454"/>
        <line x1="606" y1="462" x2="832" y2="462"/>
        <line x1="608" y1="470" x2="830" y2="470"/>
        <line x1="612" y1="478" x2="826" y2="478"/>
        <line x1="616" y1="486" x2="822" y2="486"/>
        <line x1="620" y1="494" x2="818" y2="494"/>
        <line x1="626" y1="502" x2="812" y2="502"/>
        <line x1="634" y1="510" x2="804" y2="510"/>
        <line x1="644" y1="518" x2="794" y2="518"/>
        <line x1="656" y1="526" x2="782" y2="526"/>
        <line x1="672" y1="534" x2="766" y2="534"/>
        <line x1="690" y1="542" x2="750" y2="542"/>
      </g>

      <!-- a single autumn leaf next to it (cabernet franc's herbal/autumn) -->
      <g transform="translate(1080, 480) rotate(-15)" fill="none" stroke="#2a2820" stroke-width="1.2" stroke-linecap="round">
        <path d="M 0 0
                 Q 30 -60 80 -50
                 Q 110 -20 100 30
                 Q 60 50 30 40
                 Q 10 30 0 0 Z"/>
        <!-- main vein -->
        <path d="M 0 0 Q 50 0 100 10" stroke-width="0.9"/>
        <!-- secondary veins -->
        <g stroke-width="0.5" opacity="0.7">
          <path d="M 30 -10 Q 50 -32 70 -42"/>
          <path d="M 50 -2 Q 70 -16 88 -22"/>
          <path d="M 30 12 Q 50 22 64 32"/>
          <path d="M 60 8 Q 76 18 88 26"/>
        </g>
        <!-- stem -->
        <line x1="0" y1="0" x2="-30" y2="20"/>
      </g>

      <!-- pencil annotation text in cursive -->
      <g font-family="'Snell Roundhand', 'Apple Chancery', cursive" fill="#2a2820" opacity="0.85">
        <text x="240" y="220" font-size="32" font-style="italic">Cabernet Franc —</text>
        <text x="240" y="262" font-size="18">graphite of the nose,</text>
        <text x="240" y="288" font-size="18">violet on the second breath</text>
        <text x="240" y="318" font-size="14" opacity="0.7">— Loire, late october</text>

        <!-- arrows pointing at glass details -->
        <path d="M 480 320 L 580 348" fill="none" stroke="#2a2820" stroke-width="0.8" opacity="0.5"/>
        <text x="420" y="312" font-size="13" opacity="0.7">"pencil shavings"</text>

        <path d="M 980 420 L 870 450" fill="none" stroke="#2a2820" stroke-width="0.8" opacity="0.5"/>
        <text x="1000" y="416" font-size="13" opacity="0.7">cooler colour than CS</text>
      </g>

      <!-- date stamp lower right -->
      <text x="1500" y="820" text-anchor="end" font-family="'Courier New', monospace"
            font-size="13" fill="#2a2820" opacity="0.5">13/MMXXVI · CHINON</text>
    </svg>

<svg role="img" aria-label="Chenin Blanc illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="cb-grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#e8e0d0"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#c8b8a0" stroke-width="0.3"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#c8b8a0" stroke-width="0.3"/>
    </pattern>
    <pattern id="cb-slate" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#4a5058"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="#384048" stroke-width="0.5"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="#384048" stroke-width="0.3"/>
    </pattern>
    <pattern id="cb-slate-light" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#606870"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="#505860" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- blueprint paper -->
  <rect width="1600" height="900" fill="#e8e0d0"/>
  <rect width="1600" height="900" fill="url(#cb-grid)"/>

  <!-- CHÂTEAU ELEVATION (architectural drawing of a Loire château) -->
  <g transform="translate(400, 320)" fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linecap="round">

    <!-- main body -->
    <rect x="0" y="0" width="300" height="200"/>
    <!-- roof -->
    <polygon points="-20,0 150,-100 320,0"/>
    <!-- central tower -->
    <rect x="120" y="-60" width="60" height="60"/>
    <polygon points="110,-60 150,-100 190,-60"/>
    <!-- chimney left -->
    <rect x="40" y="-40" width="16" height="40"/>
    <rect x="36" y="-48" width="24" height="8"/>
    <!-- chimney right -->
    <rect x="244" y="-40" width="16" height="40"/>
    <rect x="240" y="-48" width="24" height="8"/>

    <!-- windows row 1 (second floor) -->
    <rect x="30" y="40" width="25" height="35" rx="12" stroke-width="0.8"/>
    <rect x="80" y="40" width="25" height="35" rx="12" stroke-width="0.8"/>
    <rect x="130" y="-20" width="40" height="60" rx="2" stroke-width="0.8"/>
    <rect x="195" y="40" width="25" height="35" rx="12" stroke-width="0.8"/>
    <rect x="245" y="40" width="25" height="35" rx="12" stroke-width="0.8"/>

    <!-- windows row 2 (ground floor) -->
    <rect x="30" y="110" width="30" height="50" rx="15" stroke-width="0.8"/>
    <rect x="80" y="110" width="30" height="50" rx="15" stroke-width="0.8"/>
    <rect x="140" y="100" width="20" height="60" rx="2" stroke-width="0.8"/>
    <rect x="195" y="110" width="30" height="50" rx="15" stroke-width="0.8"/>
    <rect x="245" y="110" width="30" height="50" rx="15" stroke-width="0.8"/>

    <!-- main door -->
    <rect x="137" y="100" width="26" height="60" rx="13" stroke-width="1.2"/>
    <circle cx="155" cy="142" r="2" fill="#1a1612" stroke="none"/>

    <!-- dormer windows -->
    <polygon points="40,-20 50,-45 60,-20" stroke-width="0.7"/>
    <polygon points="240,-20 250,-45 260,-20" stroke-width="0.7"/>

    <!-- architectural annotations -->
    <g stroke="none" fill="#1a1612" font-family="'Courier New', monospace" font-size="9" opacity="0.7">
      <text x="150" y="230" text-anchor="middle">ÉLÉVATION · FAÇADE SUD</text>
    </g>
  </g>

  <!-- dimension lines -->
  <g stroke="#1a1612" stroke-width="0.4" opacity="0.5">
    <line x1="390" y1="520" x2="710" y2="520"/>
    <line x1="390" y1="510" x2="390" y2="530"/>
    <line x1="710" y1="510" x2="710" y2="530"/>
    <text x="550" y="534" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a1612" opacity="0.6">32 m</text>
  </g>

  <!-- SLATE DETAIL (cross-section of Loire soil) -->
  <g transform="translate(980, 250)">
    <!-- title -->
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="9" fill="#1a1612" opacity="0.7">SECTION A-A · SCHISTE ARDOISIER</text>

    <!-- soil layers -->
    <rect x="0" y="10" width="200" height="26" fill="#a09070" stroke="#1a1612" stroke-width="0.8"/>
    <text x="4" y="28" font-family="'Courier New', monospace" font-size="8" fill="#1a1612" opacity="0.7">TOPSOIL · 0.2 m</text>

    <rect x="0" y="36" width="200" height="40" fill="url(#cb-slate-light)" stroke="#1a1612" stroke-width="0.8"/>
    <text x="4" y="58" font-family="'Courier New', monospace" font-size="8" fill="#e0d8c8" opacity="0.9">WEATHERED SCHIST · 0.6 m</text>

    <rect x="0" y="76" width="200" height="60" fill="url(#cb-slate)" stroke="#1a1612" stroke-width="0.8"/>
    <text x="4" y="106" font-family="'Courier New', monospace" font-size="8" fill="#e0d8c8" opacity="0.9">SLATE BEDROCK · 1.5 m</text>

    <!-- depth line -->
    <line x1="220" y1="10" x2="220" y2="136" stroke="#1a1612" stroke-width="0.4"/>
    <line x1="215" y1="10" x2="225" y2="10"/>
    <line x1="215" y1="136" x2="225" y2="136"/>
    <text x="232" y="78" font-family="'Courier New', monospace" font-size="8" fill="#1a1612" opacity="0.6" transform="rotate(90 232 78)">DEPTH 2.3 m</text>
  </g>

  <!-- Vine trellis detail (right side) -->
  <g transform="translate(1260, 440)" stroke="#1a1612" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="0" y1="0" x2="0" y2="180"/>
    <line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="0" y1="40" x2="40" y2="40"/>
    <line x1="0" y1="80" x2="40" y2="80"/>
    <line x1="0" y1="120" x2="40" y2="120"/>
    <line x1="0" y1="160" x2="40" y2="160"/>
    <!-- vine -->
    <path d="M 0 180 Q -10 140 5 100 Q 20 60 10 20" stroke-width="1.2"/>
    <!-- compass rose annotation -->
    <g transform="translate(60, 60)" stroke="#1a1612" stroke-width="0.7" fill="none" opacity="0.6">
      <circle cx="0" cy="0" r="14"/>
      <circle cx="0" cy="0" r="10" stroke-width="0.4"/>
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-14" y1="0" x2="14" y2="0"/>
      <!-- N indicator -->
      <polygon points="0,-14 3,-6 0,-8 -3,-6" fill="#1a1612" stroke="none"/>
      <text x="0" y="-20" font-family="'Courier New', monospace" font-size="7" fill="#1a1612" opacity="0.7" text-anchor="middle" stroke="none">N</text>
    </g>
    <!-- elevation annotation -->
    <text x="50" y="140" font-family="'Courier New', monospace" font-size="7" fill="#1a1612" opacity="0.6">ELEV. 87 m</text>
  </g>

  <!-- main title -->
  <text x="100" y="140" font-family="'Courier New', 'Consolas', monospace"
        font-size="36" font-weight="700" letter-spacing="0.08em" fill="#1a1612" opacity="0.9">CHENIN BLANC</text>
  <text x="102" y="170" font-family="'Courier New', monospace"
        font-size="14" letter-spacing="0.25em" fill="#1a1612" opacity="0.6">LOIRE · VOUVRAY · SAVENNIÈRES</text>

  <!-- project stamp box -->
  <g transform="translate(1260, 140)" stroke="#1a1612" stroke-width="1" fill="none">
    <rect x="0" y="0" width="200" height="80"/>
    <text x="10" y="20" font-family="'Courier New', monospace" font-size="10" fill="#1a1612" opacity="0.8">DRWG: SITE SURVEY</text>
    <text x="10" y="36" font-family="'Courier New', monospace" font-size="10" fill="#1a1612" opacity="0.8">SCALE: 1:200</text>
    <text x="10" y="52" font-family="'Courier New', monospace" font-size="10" fill="#1a1612" opacity="0.8">DATE: MMXXVI</text>
    <text x="10" y="68" font-family="'Courier New', monospace" font-size="10" fill="#1a1612" opacity="0.8">REV: A</text>
  </g>

  <!-- bottom rule -->
  <line x1="60" y1="800" x2="1540" y2="800" stroke="#1a1612" stroke-width="0.5" opacity="0.4"/>
  <text x="60" y="830" font-family="'Courier New', monospace" font-size="9" fill="#1a1612" opacity="0.5">PROJECT: PUTAOSO · LOIRE CRU ARCHIVE</text>
  <text x="1540" y="830" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#1a1612" opacity="0.5">SHEET 01/12</text>
</svg>

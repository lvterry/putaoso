<svg role="img" aria-label="Gruner Veltliner illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gv-greenbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8aaa50"/>
      <stop offset="100%" stop-color="#4a7828"/>
    </linearGradient>
    <linearGradient id="gv-greenbar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a9840"/>
      <stop offset="100%" stop-color="#2a5818"/>
    </linearGradient>
  </defs>

  <!-- stark white background -->
  <rect width="1600" height="900" fill="#f5f3e8"/>

  <!-- large circular form (bubble/pepper) anchoring the composition -->
  <circle cx="1000" cy="400" r="300" fill="#d0dfb0" opacity="0.3"/>

  <!-- HORIZONTAL BANDS (Swiss typographic style) -->
  <rect x="0" y="120" width="1600" height="60" fill="url(#gv-greenbar)"/>
  <rect x="0" y="540" width="1600" height="12" fill="#2a5818"/>
  <rect x="0" y="560" width="1600" height="40" fill="url(#gv-greenbar2)"/>

  <!-- vertical rule (grid) -->
  <line x1="700" y1="0" x2="700" y2="900" stroke="#2a5818" stroke-width="2" opacity="0.15"/>

  <!-- wine glass (simplified to basic geometric shapes) -->
  <g transform="translate(440, 340)" stroke="#1a1a1a" stroke-width="2.5" fill="none">
    <!-- bowl -->
    <path d="M -70 0 C -70 -30 -40 -80 0 -80 C 40 -80 70 -30 70 0 L 70 60 C 70 100 40 120 0 120 C -40 120 -70 100 -70 60 Z"/>
    <!-- stem -->
    <line x1="0" y1="120" x2="0" y2="180"/>
    <!-- base -->
    <ellipse cx="0" cy="200" rx="50" ry="8" stroke-width="2"/>
    <!-- wine fill line -->
    <path d="M -68 10 C -40 10 40 10 68 10" stroke="#8aaa50" stroke-width="3" fill="none" opacity="0.8"/>
  </g>

  <!-- WHITE WINE in glass (solid green fill) -->
  <path d="M 370 350 C 370 340 400 340 440 340 C 480 340 510 340 510 350 L 510 400 C 510 410 480 420 440 420 C 400 420 370 410 370 400 Z"
        fill="#8aaa50" opacity="0.4"/>

  <!-- PEPPERCORNS (scattered, geometric) -->
  <g fill="#1a1a1a">
    <circle cx="1150" cy="280" r="6"/>
    <circle cx="1200" cy="260" r="5"/>
    <circle cx="1180" cy="310" r="5"/>
    <circle cx="1230" cy="290" r="6"/>
    <circle cx="1160" cy="340" r="5"/>
    <circle cx="1210" cy="350" r="5"/>
    <circle cx="1240" cy="330" r="4"/>
    <circle cx="1120" cy="300" r="4"/>
  </g>

  <!-- green pepper (capsicum) icon -->
  <g transform="translate(1150, 450)">
    <path d="M 0 -40 Q 40 -40 45 -10 Q 50 20 30 50 Q 10 70 0 80 Q -10 70 -30 50 Q -50 20 -45 -10 Q -40 -40 0 -40 Z"
          fill="none" stroke="#2a5818" stroke-width="2.5"/>
    <path d="M 0 -40 L 0 -60" stroke="#2a5818" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 -10 L 20 -20" stroke="#2a5818" stroke-width="1.5" opacity="0.5"/>
    <path d="M 0 -10 L -20 -20" stroke="#2a5818" stroke-width="1.5" opacity="0.5"/>
    <path d="M -10 20 L 10 20" stroke="#2a5818" stroke-width="2"/>
    <path d="M 0 -10 L 0 60" stroke="#2a5818" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- grape cluster (minimal) -->
  <g transform="translate(980, 480)" fill="#6a9840" opacity="0.85">
    <circle cx="0" cy="-15" r="10"/>
    <circle cx="-10" cy="-2" r="10"/>
    <circle cx="10" cy="-2" r="10"/>
    <circle cx="-18" cy="12" r="10"/>
    <circle cx="0" cy="12" r="10"/>
    <circle cx="18" cy="12" r="10"/>
    <circle cx="-8" cy="26" r="10"/>
    <circle cx="8" cy="26" r="10"/>
    <circle cx="0" cy="40" r="10"/>
  </g>

  <!-- Helvetica title (Swiss design) -->
  <g font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif" fill="#1a1a1a">
    <text x="80" y="90" font-size="11" font-weight="700" letter-spacing="0.3em" opacity="0.5">WEISS · WACHAU</text>
    <text x="80" y="250" font-size="64" font-weight="700" letter-spacing="-0.02em">GRÜNER</text>
    <text x="80" y="320" font-size="64" font-weight="700" letter-spacing="-0.02em">VELTLINER</text>
    <line x1="80" y1="345" x2="380" y2="345" stroke="#1a1a1a" stroke-width="2"/>
    <text x="80" y="380" font-size="14" font-weight="500" letter-spacing="0.28em" opacity="0.7">NIEDERÖSTERREICH</text>
  </g>

  <!-- bottom info bar -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#f5f3e8" font-size="11" font-weight="500">
    <text x="80" y="585" letter-spacing="0.2em">GRÜNER VELTLINER · 2025</text>
    <text x="1480" y="585" text-anchor="end" letter-spacing="0.2em">STEINFEDER · FEDERSIEL · SMARAGD</text>
  </g>

  <!-- small green circle (accent) -->
  <circle cx="80" cy="480" r="16" fill="#4a7828"/>
  <text x="80" y="486" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#f5f3e8">GV</text>

  <!-- terroir data (minimal grid info) -->
  <g font-family="'Helvetica Neue', monospace" font-size="10" fill="#1a1a1a" opacity="0.4">
    <text x="1310" y="560" text-anchor="end">LOESS · 48° N · 200 m</text>
    <text x="1310" y="575" text-anchor="end">PFEFFER · MINERAL · STRAHLEND</text>
  </g>
</svg>

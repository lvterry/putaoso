<svg role="img" aria-label="Marselan illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <filter id="ms-ink" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="5"/>
          <feDisplacementMap in="SourceGraphic" scale="3"/>
        </filter>
        <radialGradient id="ms-far" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#5a5048" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#5a5048" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- xuan paper -->
      <rect width="1600" height="900" fill="#f0e8d4"/>
      <ellipse cx="900" cy="500" rx="800" ry="450" fill="#e8d8b8" opacity="0.3"/>

      <!-- far mountains (lightest wash) -->
      <path d="M 100 380
               Q 240 320 340 360
               Q 440 320 540 360
               Q 660 300 780 360
               Q 900 340 1020 360
               Q 1140 320 1240 360
               Q 1340 340 1480 380
               L 1480 440
               L 100 440 Z"
            fill="#7a7068" opacity="0.35" filter="url(#ms-ink)"/>

      <!-- middle mountains (darker) -->
      <path d="M 200 460
               Q 320 380 420 440
               Q 540 390 640 460
               Q 760 410 880 470
               Q 1000 420 1120 480
               Q 1240 440 1380 490
               L 1380 540
               L 200 540 Z"
            fill="#3a342c" opacity="0.65" filter="url(#ms-ink)"/>

      <!-- closer rocky shore (darkest) -->
      <path d="M 0 600
               Q 100 580 200 610
               L 240 580 L 320 620 L 380 590
               Q 440 640 540 610 L 580 640
               Q 660 600 760 640
               L 800 620 L 880 650 L 940 620
               Q 1020 670 1140 640 L 1200 670
               Q 1300 630 1400 670 L 1480 640
               Q 1560 670 1600 660
               L 1600 720 L 0 720 Z"
            fill="#1a1612" opacity="0.92" filter="url(#ms-ink)"/>

      <!-- mist band -->
      <rect x="0" y="440" width="1600" height="100" fill="#f0e8d4" opacity="0.55"/>
      <rect x="0" y="540" width="1600" height="40" fill="#f0e8d4" opacity="0.4"/>

      <!-- a single pine tree on the foreground rock -->
      <g transform="translate(380, 600)">
        <!-- trunk -->
        <path d="M 0 0 Q -4 -40 6 -90 Q 10 -120 4 -160 Q 0 -180 -6 -200"
              fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>
        <!-- branches -->
        <path d="M 4 -100 Q 40 -110 70 -90"
              fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 2 -150 Q -30 -160 -50 -150"
              fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M -2 -180 Q 30 -190 50 -180"
              fill="none" stroke="#1a1208" stroke-width="2" stroke-linecap="round"/>
        <!-- pine needle clusters (dot clusters) -->
        <g fill="#1a1208">
          <circle cx="70" cy="-92" r="3"/><circle cx="78" cy="-86" r="3"/>
          <circle cx="64" cy="-86" r="3"/><circle cx="72" cy="-80" r="3"/>
          <circle cx="80" cy="-78" r="3"/><circle cx="86" cy="-92" r="3"/>
          <circle cx="-50" cy="-150" r="3"/><circle cx="-58" cy="-144" r="3"/>
          <circle cx="-44" cy="-156" r="3"/><circle cx="-56" cy="-158" r="3"/>
          <circle cx="-48" cy="-140" r="3"/>
          <circle cx="50" cy="-180" r="3"/><circle cx="58" cy="-174" r="3"/>
          <circle cx="44" cy="-186" r="3"/><circle cx="56" cy="-188" r="3"/>
          <circle cx="48" cy="-172" r="3"/>
          <circle cx="-6" cy="-205" r="3"/><circle cx="0" cy="-208" r="3"/>
          <circle cx="-12" cy="-200" r="3"/>
        </g>
      </g>

      <!-- a tiny pavilion in the middle distance -->
      <g transform="translate(820, 478)" fill="#1a1208" opacity="0.8">
        <path d="M -16 0 L 16 0 L 16 -10 L -16 -10 Z"/>
        <path d="M -24 -10 L 0 -28 L 24 -10 Z"/>
        <path d="M -22 -28 Q 0 -36 22 -28" fill="none" stroke="#1a1208" stroke-width="1.5"/>
      </g>

      <!-- one tiny figure on shore -->
      <circle cx="500" cy="618" r="3" fill="#1a1208"/>
      <line x1="500" y1="620" x2="500" y2="640" stroke="#1a1208" stroke-width="1.5"/>

      <!-- calligraphic title column on right -->
      <g font-family="'Songti SC', 'STSong', serif" fill="#1a1208">
        <text x="1440" y="160" font-size="46" letter-spacing="0.15em">马</text>
        <text x="1440" y="216" font-size="46" letter-spacing="0.15em">瑟</text>
        <text x="1440" y="272" font-size="46" letter-spacing="0.15em">兰</text>
        <line x1="1438" y1="294" x2="1480" y2="294" stroke="#1a1208" stroke-width="1"/>
        <text x="1440" y="328" font-size="14" letter-spacing="0.3em">贺 兰</text>
        <text x="1440" y="352" font-size="14" letter-spacing="0.3em">山 东</text>
        <text x="1440" y="376" font-size="14" letter-spacing="0.3em">麓</text>
      </g>

      <!-- red seal -->
      <g transform="translate(1430, 420)">
        <rect width="56" height="56" fill="#a83020"/>
        <text x="28" y="42" text-anchor="middle"
              font-family="'Songti SC', serif" font-size="34" fill="#f0e8d4">宁</text>
      </g>
    </svg>

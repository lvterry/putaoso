<svg role="img" aria-label="Vermentino illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="vr-facet" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#e8e0d4"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="#c8b8a8" stroke-width="0.3" opacity="0.3"/>
      <line x1="20" y1="0" x2="0" y2="20" stroke="#c8b8a8" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- warm stone background -->
  <rect width="1600" height="900" fill="#e8e0d4"/>
  <rect width="1600" height="900" fill="url(#vr-facet)"/>

  <!-- CUBIST SEA (faceted angles) -->
  <g fill="none" stroke="#1a2a40" stroke-linecap="round">
    <!-- angular waves -->
    <path d="M 0 280 L 160 260 L 260 300 L 400 270 L 520 310 L 640 280
             L 760 310 L 880 290 L 1000 320 L 1120 300 L 1240 330
             L 1360 310 L 1480 340 L 1600 320 L 1600 400 L 0 400 Z"
          fill="#4a7898" stroke-width="1.5" opacity="0.7"/>
    <path d="M 0 350 L 180 330 L 300 360 L 440 340 L 560 370 L 700 350
             L 820 380 L 960 360 L 1080 390 L 1220 370 L 1340 400
             L 1480 380 L 1600 400 L 1600 480 L 0 480 Z"
          fill="#2a5878" stroke-width="1.5" opacity="0.85"/>
    <!-- white cap angles -->
    <polygon points="260,300 280,290 300,310 280,320" fill="#e0e8ec" stroke="#1a2a40" stroke-width="1"/>
    <polygon points="760,310 780,300 800,320 780,330" fill="#e0e8ec" stroke="#1a2a40" stroke-width="1"/>
    <polygon points="1240,330 1260,320 1280,340 1260,350" fill="#e0e8ec" stroke="#1a2a40" stroke-width="1"/>
  </g>

  <!-- CUBIST ROCKS (Sardinian coastline, faceted) -->
  <g fill="none" stroke="#1a1612" stroke-linejoin="round">
    <!-- rock formation 1 (left) -->
    <polygon points="120,500 200,420 340,450 380,540 280,600 160,580"
             fill="#a89880" stroke-width="2"/>
    <polygon points="200,420 260,460 340,450 300,520 200,500"
             fill="#b8a890" stroke-width="1.5" opacity="0.7"/>
    <polygon points="160,580 280,600 220,680 120,660"
             fill="#887860" stroke-width="2"/>
    <polygon points="280,600 380,540 420,620 340,680 220,680"
             fill="#988878" stroke-width="2"/>

    <!-- rock formation 2 (right) -->
    <polygon points="1100,480 1220,440 1360,460 1400,540 1280,580 1140,560"
             fill="#a89880" stroke-width="2"/>
    <polygon points="1220,440 1300,480 1360,460 1320,520 1240,500"
             fill="#b8a890" stroke-width="1.5" opacity="0.7"/>
    <polygon points="1140,560 1280,580 1220,660 1080,640"
             fill="#887860" stroke-width="2"/>
    <polygon points="1280,580 1400,540 1440,620 1320,680 1220,660"
             fill="#988878" stroke-width="2"/>
  </g>

  <!-- CUBIST SAILBOAT -->
  <g transform="translate(800, 380)">
    <!-- hull (faceted) -->
    <polygon points="-60,0 -40,30 40,30 60,0"
             fill="#e0d8c8" stroke="#1a1612" stroke-width="2"/>
    <polygon points="-40,30 -20,40 20,40 40,30"
             fill="#c8b8a8" stroke="#1a1612" stroke-width="1.5"/>
    <!-- mast -->
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#1a1612" stroke-width="2.5"/>
    <!-- sail (fragmented triangles) -->
    <polygon points="0,-90 -40,-20 0,-20"
             fill="#e0d8c8" stroke="#1a1612" stroke-width="1.5"/>
    <polygon points="0,-80 -30,-20 0,-20"
             fill="#f0e8d8" stroke="#1a1612" stroke-width="1"/>
    <polygon points="0,-90 10,-40 40,-20 0,-20"
             fill="#d8c8b8" stroke="#1a1612" stroke-width="1.5"/>
  </g>

  <!-- CUBIST SAILBOAT 2 (distant, right) -->
  <g transform="translate(1080, 360)">
    <polygon points="-30,0 -20,18 20,18 30,0"
             fill="#d0c8b8" stroke="#1a1612" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#1a1612" stroke-width="1.5"/>
    <polygon points="0,-54 -24,-10 0,-10"
             fill="#d0c8b8" stroke="#1a1612" stroke-width="1"/>
    <polygon points="0,-54 8,-20 20,-10 0,-10"
             fill="#c8b8a8" stroke="#1a1612" stroke-width="1"/>
  </g>

  <!-- seabirds (cubist triangles) -->
  <g fill="#1a1612" opacity="0.6">
    <polygon points="200,200 210,185 220,200 210,195"/>
    <polygon points="230,190 238,178 246,190 238,186"/>
    <polygon points="180,210 188,198 196,210 188,206"/>
    <polygon points="320,170 326,160 332,170 326,167"/>
    <polygon points="340,160 346,150 352,160 346,156"/>
    <polygon points="1400,240 1406,228 1412,240 1406,236"/>
    <polygon points="1420,230 1426,218 1432,230 1426,226"/>
  </g>

  <!-- faceted spray / whitecaps -->
  <g fill="#e0e8ec" stroke="#1a2a40" stroke-width="0.8" opacity="0.5">
    <polygon points="500,320 520,310 530,330 510,340"/>
    <polygon points="900,300 920,290 930,310 910,320"/>
    <polygon points="1300,290 1320,280 1330,300 1310,310"/>
  </g>

  <!-- angular rocks (more faceted coastline) -->
  <g fill="none" stroke="#1a1612" stroke-linejoin="round">
    <polygon points="0,500 60,460 120,490 140,560 80,590 30,570"
             fill="#a89880" stroke-width="1.5" opacity="0.6"/>
    <polygon points="1460,470 1540,440 1600,490 1600,580 1520,560 1480,520"
             fill="#988878" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- more faceted waves (midground texture) -->
  <g fill="none" stroke="#1a2a40" stroke-width="1" opacity="0.4">
    <polygon points="1000,500 1040,490 1060,510 1020,520" fill="#3a6888"/>
    <polygon points="1060,510 1100,500 1120,520 1080,530" fill="#3a6888"/>
    <polygon points="1120,520 1160,510 1180,530 1140,540" fill="#3a6888"/>
    <polygon points="420,530 460,520 480,540 440,550" fill="#3a6888"/>
    <polygon points="480,540 520,530 540,550 500,560" fill="#3a6888"/>
    <polygon points="120,550 160,540 180,560 140,570" fill="#3a6888"/>
    <polygon points="1380,480 1420,470 1440,490 1400,500" fill="#3a6888"/>
  </g>

  <!-- angular sun -->
  <g transform="translate(1400, 220)">
    <polygon points="0,-60 15,-15 60,0 15,15 0,60 -15,15 -60,0 -15,-15"
             fill="#e0c070" stroke="#1a1612" stroke-width="2"/>
    <polygon points="0,-30 8,-8 30,0 8,8 0,30 -8,8 -30,0 -8,-8"
             fill="#d8b860" stroke="none"/>
  </g>

  <!-- faceted waves foreground -->
  <g fill="#3a6888" stroke="#1a2a40" stroke-width="1" opacity="0.6">
    <polygon points="0,680 120,660 200,700 80,720"/>
    <polygon points="200,700 320,680 400,720 280,740"/>
    <polygon points="400,720 520,700 600,740 480,760"/>
    <polygon points="600,740 720,720 800,760 680,780"/>
    <polygon points="800,760 920,740 1000,780 880,800"/>
    <polygon points="1000,780 1120,760 1200,800 1080,820"/>
    <polygon points="1200,800 1320,780 1400,820 1280,840"/>
    <polygon points="1400,820 1520,800 1600,840 1480,860"/>
  </g>

  <!-- title (geometric sans, fragmented effect) -->
  <g font-family="'Futura', 'Century Gothic', sans-serif" fill="#1a1612">
    <text x="100" y="140" font-size="56" font-weight="700" letter-spacing="-0.02em">VERMENTINO</text>
    <text x="104" y="180" font-size="16" font-weight="500" letter-spacing="0.35em" opacity="0.7">SARDEGNA · MARE MEDITERRANEO</text>
  </g>

  <!-- annotation: fragmented text -->
  <text x="80" y="830" font-family="'Futura', sans-serif" font-size="11" fill="#1a1612" opacity="0.5">BRISA · GRANITO · SALINO</text>
  <text x="1520" y="830" text-anchor="end" font-family="'Futura', sans-serif" font-size="11" fill="#1a1612" opacity="0.5">CUBO · MMXXVI</text>
</svg>

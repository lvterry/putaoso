<svg role="img" aria-label="Nebbiolo illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="nb-fog" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#ede0ca"/>
      <circle cx="10" cy="10" r="1.2" fill="#d8c8b0" opacity="0.3"/>
    </pattern>
    <linearGradient id="nb-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c8b8"/>
      <stop offset="60%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#f0e4d0"/>
    </linearGradient>
    <linearGradient id="nb-fogband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcc8" stop-opacity="0"/>
      <stop offset="40%" stop-color="#f0e4d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f0e4d0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- aged sepia paper -->
  <rect width="1600" height="900" fill="#ede0ca"/>
  <rect width="1600" height="900" fill="url(#nb-fog)"/>

  <!-- vignette darkening -->
  <rect width="1600" height="900" fill="url(#nb-fogband)"/>

  <!-- distant Alps silhouette (very faint) -->
  <path d="M 0 320 L 80 260 L 160 290 L 240 230 L 320 280 L 400 210 L 480 270 L 560 200 L 640 260 L 720 230 L 800 190 L 880 240 L 960 200 L 1040 250 L 1120 210 L 1200 280 L 1280 230 L 1360 260 L 1440 210 L 1520 270 L 1600 240 L 1600 420 L 0 420 Z"
        fill="#b8a898" opacity="0.25"/>

  <!-- middle hills -->
  <path d="M 0 380 Q 200 340 400 360 Q 600 320 800 350 Q 1000 330 1200 360 Q 1400 340 1600 370 L 1600 500 L 0 500 Z"
        fill="#c8b8a0" opacity="0.45"/>

  <!-- rolling Langhe hills with terraced vineyards -->
  <path d="M 0 460
           C 200 430 350 480 500 460
           C 650 440 800 490 1000 470
           C 1160 450 1320 500 1600 480
           L 1600 620 L 0 620 Z"
        fill="#a09078" opacity="0.55"/>

  <path d="M 0 540
           C 300 510 600 560 900 540
           C 1100 520 1350 570 1600 550
           L 1600 700 L 0 700 Z"
        fill="#887860" opacity="0.65"/>

  <!-- vineyard row lines (fine etching of terraces) -->
  <g stroke="#706048" stroke-width="0.6" opacity="0.4" fill="none">
    <path d="M 0 520 Q 400 490 800 510 T 1600 510"/>
    <path d="M 0 550 Q 400 520 800 540 T 1600 540"/>
    <path d="M 0 580 Q 400 550 800 570 T 1600 570"/>
    <path d="M 0 610 Q 400 580 800 600 T 1600 600"/>
    <path d="M 0 640 Q 400 610 800 630 T 1600 630"/>
  </g>

  <!-- CASTLE: medieval hilltop fortress silhouette (fine pen detail) -->
  <g transform="translate(680, 410)" fill="#584830" stroke="#483820" stroke-width="1.2">
    <!-- main keep -->
    <rect x="-20" y="-80" width="40" height="80"/>
    <!-- turret left -->
    <rect x="-36" y="-60" width="16" height="60"/>
    <!-- turret right -->
    <rect x="20" y="-60" width="16" height="60"/>
    <!-- battlements -->
    <g fill="#584830" stroke="none">
      <rect x="-20" y="-88" width="8" height="8"/>
      <rect x="-8" y="-88" width="8" height="8"/>
      <rect x="4" y="-88" width="8" height="8"/>
      <rect x="16" y="-88" width="8" height="8"/>
      <rect x="-36" y="-68" width="6" height="8"/>
      <rect x="-26" y="-68" width="6" height="8"/>
      <rect x="22" y="-68" width="6" height="8"/>
      <rect x="32" y="-68" width="6" height="8"/>
    </g>
    <!-- door -->
    <rect x="-6" y="-20" width="12" height="20" fill="#2a1a10"/>
    <!-- window -->
    <rect x="-4" y="-50" width="8" height="10" fill="#2a1a10"/>
    <!-- tower caps -->
    <polygon points="-36,-60 -28,-70 -20,-60" fill="#483820" stroke="none"/>
    <polygon points="20,-60 28,-70 36,-60" fill="#483820" stroke="none"/>
  </g>

  <!-- SECOND CASTLE (smaller, far right) -->
  <g transform="translate(1200, 420) scale(0.65)" fill="#584830" stroke="#483820" stroke-width="1.2">
    <rect x="-20" y="-80" width="40" height="80"/>
    <rect x="-36" y="-60" width="16" height="60"/>
    <rect x="20" y="-60" width="16" height="60"/>
    <g fill="#584830" stroke="none">
      <rect x="-20" y="-88" width="8" height="8"/>
      <rect x="-8" y="-88" width="8" height="8"/>
      <rect x="4" y="-88" width="8" height="8"/>
      <rect x="16" y="-88" width="8" height="8"/>
    </g>
    <rect x="-6" y="-20" width="12" height="20" fill="#2a1a10"/>
    <polygon points="-20,-60 -12,-70 -4,-60" fill="#483820" stroke="none"/>
    <polygon points="4,-60 12,-70 20,-60" fill="#483820" stroke="none"/>
  </g>

  <!-- fog bands (horizontal atmospheric streaks) -->
  <g fill="#ede0ca" opacity="0.6">
    <ellipse cx="300" cy="400" rx="250" ry="12"/>
    <ellipse cx="900" cy="420" rx="300" ry="8"/>
    <ellipse cx="1400" cy="440" rx="200" ry="10"/>
    <ellipse cx="600" cy="500" rx="180" ry="6"/>
    <ellipse cx="1100" cy="480" rx="220" ry="8"/>
  </g>

  <!-- foreground: gnarly old nebbiolo vine (etched) -->
  <g transform="translate(380, 680)" fill="none" stroke="#3a2818" stroke-linecap="round">
    <!-- trunk -->
    <path d="M 0 0 Q -8 -60 -12 -120 Q -14 -160 -10 -200" stroke-width="5"/>
    <path d="M 0 0 Q 6 -50 8 -100 Q 10 -140 6 -180" stroke-width="4"/>
    <!-- branches -->
    <path d="M -10 -120 Q -40 -150 -60 -140" stroke-width="2.5"/>
    <path d="M -10 -150 Q -50 -180 -70 -170" stroke-width="2"/>
    <path d="M 8 -100 Q 40 -120 60 -110" stroke-width="2.5"/>
    <path d="M 6 -140 Q 30 -160 50 -150" stroke-width="2"/>
    <path d="M 6 -160 Q 20 -190 40 -180" stroke-width="2"/>
    <!-- tiny tendrils -->
    <path d="M -60 -140 Q -80 -130 -90 -145 Q -80 -155 -70 -145" stroke-width="1" opacity="0.7"/>
    <path d="M 60 -110 Q 80 -100 90 -115 Q 80 -125 70 -115" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- grape cluster on the vine -->
  <g transform="translate(50, -175) scale(0.4)">
    <g fill="#3a0820">
      <circle cx="0" cy="-40" r="12"/>
      <circle cx="-14" cy="-22" r="12"/>
      <circle cx="14" cy="-22" r="12"/>
      <circle cx="-28" cy="-4" r="12"/>
      <circle cx="0" cy="-4" r="12"/>
      <circle cx="28" cy="-4" r="12"/>
      <circle cx="-14" cy="14" r="12"/>
      <circle cx="14" cy="14" r="12"/>
      <circle cx="0" cy="32" r="12"/>
    </g>
    <!-- highlight -->
    <g fill="#584830" opacity="0.5">
      <circle cx="-4" cy="-44" r="3"/>
      <circle cx="-18" cy="-26" r="3"/>
      <circle cx="10" cy="-26" r="3"/>
      <circle cx="-32" cy="-8" r="3"/>
      <circle cx="-4" cy="-8" r="3"/>
      <circle cx="24" cy="-8" r="3"/>
    </g>
  </g>

  <!-- etched title text -->
  <text x="160" y="140" font-family="'Trajan Pro', 'Georgia', serif" font-size="42"
        letter-spacing="0.35em" fill="#3a2818" opacity="0.9">NEBBIOLO</text>
  <text x="162" y="176" font-family="Georgia, serif" font-size="14"
        font-style="italic" letter-spacing="0.28em" fill="#5a4830" opacity="0.75">NEBbia · PIEMONTE · TARDIVO</text>

  <!-- fog-shrouded horizontal line -->
  <line x1="160" y1="196" x2="440" y2="196" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom annotation -->
  <text x="800" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="11"
        font-style="italic" letter-spacing="0.18em" fill="#5a4830" opacity="0.6">torri nella nebbia · Langhe · MMXXVI</text>

  <!-- scattered fog particles (very fine) -->
  <g fill="#ede0ca" opacity="0.8">
    <circle cx="200" cy="380" r="1.5"/><circle cx="240" cy="395" r="1"/><circle cx="280" cy="385" r="1.5"/>
    <circle cx="700" cy="410" r="1"/><circle cx="740" cy="400" r="1.5"/><circle cx="780" cy="415" r="1"/>
    <circle cx="1100" cy="430" r="1.5"/><circle cx="1140" cy="420" r="1"/><circle cx="1180" cy="435" r="1"/>
    <circle cx="500" cy="480" r="1"/><circle cx="1300" cy="460" r="1.5"/>
  </g>
</svg>

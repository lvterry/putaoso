<svg role="img" aria-label="Gamay illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="gm-benday" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="1.5" fill="#e8dcc8" opacity="0.6"/>
    </pattern>
    <pattern id="gm-benday-red" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="2" cy="2" r="1.2" fill="#1a0a0e" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- warm paper texture -->
  <rect width="1600" height="900" fill="#f2e4cc"/>

  <!-- bold red diagonal stripe (bistro awning feel) -->
  <polygon points="0,0 900,0 0,540" fill="#b82828"/>
  <polygon points="900,0 1600,0 1600,320 0,800 0,540" fill="#d43838" opacity="0.85"/>
  <polygon points="1600,320 1600,900 300,900 0,800" fill="#e8dcc8"/>

  <!-- white checkerboard pattern on the red (tablecloth) -->
  <g opacity="0.15">
    <rect x="0" y="0" width="60" height="60" fill="#fff"/>
    <rect x="120" y="0" width="60" height="60" fill="#fff"/>
    <rect x="240" y="0" width="60" height="60" fill="#fff"/>
    <rect x="360" y="0" width="60" height="60" fill="#fff"/>
    <rect x="480" y="0" width="60" height="60" fill="#fff"/>
    <rect x="600" y="0" width="60" height="60" fill="#fff"/>
    <rect x="720" y="0" width="60" height="60" fill="#fff"/>
    <rect x="840" y="0" width="60" height="60" fill="#fff"/>
    <rect x="60" y="60" width="60" height="60" fill="#fff"/>
    <rect x="180" y="60" width="60" height="60" fill="#fff"/>
    <rect x="300" y="60" width="60" height="60" fill="#fff"/>
    <rect x="420" y="60" width="60" height="60" fill="#fff"/>
    <rect x="540" y="60" width="60" height="60" fill="#fff"/>
    <rect x="660" y="60" width="60" height="60" fill="#fff"/>
    <rect x="780" y="60" width="60" height="60" fill="#fff"/>
  </g>

  <!-- steaming coffee cup (bistro atmosphere left) -->
  <g transform="translate(620, 420)">
    <!-- saucer -->
    <ellipse cx="0" cy="20" rx="36" ry="6" fill="#d8c8b0" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- cup body -->
    <path d="M -24 0 L -20 20 Q -20 28 0 28 Q 20 28 20 20 L 24 0 Z" fill="#e8dcc8" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- cup handle -->
    <path d="M 24 4 Q 38 4 38 14 Q 38 22 22 22" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- coffee surface -->
    <ellipse cx="0" cy="4" rx="22" ry="5" fill="#4a3828"/>
    <!-- steam -->
    <path d="M -8 -4 Q -10 -16 -4 -24 Q 2 -32 -2 -42" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <path d="M 4 -4 Q 8 -12 4 -22 Q 0 -30 4 -38" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- croissant (bistro atmosphere right) -->
  <g transform="translate(1110, 480) rotate(-15)">
    <path d="M -40 0 Q -50 -20 -30 -30 Q -10 -40 0 -25 Q 10 -40 30 -30 Q 50 -20 40 0 Q 30 10 0 12 Q -30 10 -40 0 Z" fill="#d4a858" stroke="#b88840" stroke-width="1.5"/>
    <path d="M -30 -20 Q -10 -28 0 -15 Q 10 -28 30 -20" fill="none" stroke="#c89838" stroke-width="1.5" opacity="0.6"/>
    <path d="M -20 -10 Q 0 -18 20 -10" fill="none" stroke="#c89838" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- lit candle -->
  <g transform="translate(1260, 460)">
    <rect x="-6" y="0" width="12" height="30" fill="#e8dcc8" stroke="#1a1a1a" stroke-width="1" rx="2"/>
    <path d="M 0 -4 Q -4 -10 0 -18 Q 4 -10 0 -4" fill="#f0e030" stroke="none"/>
    <path d="M 0 -4 Q -1 -8 0 -14" fill="#f8f0a0" stroke="none" opacity="0.8"/>
    <!-- wax drip -->
    <path d="M -6 14 Q -8 18 -6 22" fill="none" stroke="#d8c8b0" stroke-width="1.5"/>
  </g>

  <!-- a slice of bread / baguette on right -->
  <g transform="translate(1100, 520) rotate(-10)">
    <ellipse cx="0" cy="0" rx="70" ry="24" fill="#d4a858" stroke="#b88840" stroke-width="1.5"/>
    <ellipse cx="0" cy="-6" rx="65" ry="18" fill="#e8c878"/>
    <!-- scoring marks -->
    <path d="M -30 -8 L -10 -14 M -5 -10 L 15 -16 M 20 -8 L 35 -12"
          fill="none" stroke="#c8a048" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- bistro chair (side right, simplified) -->
  <g transform="translate(1260, 550)">
    <path d="M 0 0 L 0 60 M 30 0 L 30 60 M 0 60 L 30 60"
          fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M -10 10 L 40 10 M -10 20 L 40 20"
          fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -6 50 Q 15 70 36 50" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>

  <!-- hand-lettered title in red -->
  <text x="160" y="180" font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-size="80" font-weight="900" letter-spacing="-0.02em" fill="#f2e4cc">GAMAY</text>
  <text x="160" y="240" font-family="Georgia, serif" font-size="24"
        font-style="italic" letter-spacing="0.2em" fill="#f2e4cc">— beaujolais —</text>

  <!-- red circle starburst behind "Nouveau" context -->
  <circle cx="280" cy="420" r="30" fill="#b82828" opacity="0.8"/>
  <text x="280" y="426" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="900" fill="#f2e4cc">CRU</text>

  <!-- cru list on left -->
  <g font-family="Georgia, serif" font-size="12" fill="#1a1a1a" opacity="0.8">
    <text x="80" y="620">LES CRUS:</text>
    <text x="80" y="642">BROUILLY</text>
    <text x="80" y="660">CHÉNAS</text>
    <text x="80" y="678">CHIROUBLES</text>
    <text x="80" y="696">CÔTE DE BROUILLY</text>
    <text x="80" y="714">FLEURIE</text>
    <text x="80" y="732">JULIÉNAS</text>
    <text x="80" y="750">MORGON</text>
    <text x="80" y="768">MOULIN-À-VENT</text>
    <text x="80" y="786">RÉGNIÉ</text>
    <text x="80" y="804">SAINT-AMOUR</text>
  </g>

  <!-- small red star accent -->
  <g fill="#b82828">
    <polygon points="80,608 84,618 94,618 86,624 90,634 80,628 70,634 74,624 66,618 76,618"/>
  </g>

  <!-- bottom bistro line -->
  <line x1="0" y1="860" x2="1600" y2="860" stroke="#1a1a1a" stroke-width="0.8" opacity="0.3"/>
  <text x="800" y="882" text-anchor="middle" font-family="Georgia, serif"
        font-size="11" font-style="italic" fill="#1a1a1a" opacity="0.5">Le troisième jeudi de novembre · depuis 1951</text>
</svg>

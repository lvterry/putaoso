<svg role="img" aria-label="Semillon illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sm-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ae48"/>
      <stop offset="50%" stop-color="#e8c868"/>
      <stop offset="100%" stop-color="#f0d878"/>
    </linearGradient>
    <linearGradient id="sm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a30"/>
      <stop offset="50%" stop-color="#1a1020"/>
      <stop offset="100%" stop-color="#0a0810"/>
    </linearGradient>
    <pattern id="sm-halo" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="2" cy="2" r="0.5" fill="#e8c868" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- deep Byzantine dark background -->
  <rect width="1600" height="900" fill="url(#sm-bg)"/>
  <rect width="1600" height="900" fill="url(#sm-halo)"/>

  <!-- central golden mandorla (almond-shaped glory) -->
  <g transform="translate(800, 420)">
    <path d="M 0 -320
             Q 200 -300 220 -100
             Q 240 100 0 320
             Q -240 100 -220 -100
             Q -200 -300 0 -320 Z"
          fill="url(#sm-gold)" opacity="0.12"/>
    <path d="M 0 -300
             Q 180 -280 200 -90
             Q 220 90 0 300
             Q -220 90 -200 -90
             Q -180 -280 0 -300 Z"
          fill="url(#sm-gold)" opacity="0.08"/>

    <!-- Concentric gold circles (heavenly spheres) -->
    <circle cx="0" cy="0" r="220" fill="none" stroke="#d8ae48" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="210" fill="none" stroke="#e8c868" stroke-width="0.4" opacity="0.2"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#d8ae48" stroke-width="0.6" opacity="0.25"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#e8c868" stroke-width="0.3" opacity="0.15"/>

    <!-- CENTRAL GLOWING SUN (heavenly golden radiance) -->
    <g transform="translate(0, -20)">
      <!-- radiant orb -->
      <circle cx="0" cy="0" r="55" fill="url(#sm-gold)" stroke="#e8c868" stroke-width="1.5"/>
      <!-- inner brighter core -->
      <circle cx="0" cy="0" r="35" fill="#f8e898" opacity="0.6"/>
      <circle cx="0" cy="0" r="18" fill="#fcf0c0" opacity="0.5"/>
      <!-- radiating golden rays -->
      <g fill="#e8c868" opacity="0.7">
        <polygon points="0,-60 -6,-80 6,-80"/>
        <polygon points="0,60 -6,80 6,80"/>
        <polygon points="-60,0 -80,-6 -80,6"/>
        <polygon points="60,0 80,-6 80,6"/>
        <polygon points="-42,-42 -60,-56 -56,-60"/>
        <polygon points="42,42 56,60 60,56"/>
        <polygon points="42,-42 56,-60 60,-56"/>
        <polygon points="-42,42 -60,56 -56,60"/>
      </g>
      <!-- smaller rays between main rays -->
      <g fill="#d8ae48" opacity="0.5">
        <polygon points="-28,-52 -38,-72 -30,-74"/>
        <polygon points="28,-52 30,-74 38,-72"/>
        <polygon points="-28,52 -30,74 -38,72"/>
        <polygon points="28,52 38,72 30,74"/>
        <polygon points="-52,-28 -72,-38 -74,-30"/>
        <polygon points="52,-28 74,-30 72,-38"/>
        <polygon points="-52,28 -74,30 -72,38"/>
        <polygon points="52,28 72,38 74,30"/>
      </g>
      <!-- gold shimmer dots along circle edge -->
      <g fill="#f8e898" opacity="0.8">
        <circle cx="0" cy="-58" r="2.5"/>
        <circle cx="0" cy="58" r="2.5"/>
        <circle cx="-58" cy="0" r="2.5"/>
        <circle cx="58" cy="0" r="2.5"/>
        <circle cx="-41" cy="-41" r="2"/>
        <circle cx="41" cy="41" r="2"/>
        <circle cx="41" cy="-41" r="2"/>
        <circle cx="-41" cy="41" r="2"/>
      </g>
    </g>
  </g>

  <!-- corner evangelist symbols / decorative medallions -->
  <g fill="none" stroke="#d8ae48" stroke-width="1.5" opacity="0.5">
    <!-- top left: angel -->
    <g transform="translate(120, 120)">
      <circle cx="0" cy="0" r="24"/>
      <path d="M 0 -24 Q 6 -6 10 6 Q 4 2 0 6 Q -4 2 -10 6 Q -6 -6 0 -24 Z" fill="#d8ae48"/>
      <path d="M -16 -18 Q -24 -28 -18 -32 Q -12 -28 -16 -18" fill="#d8ae48"/>
      <path d="M 16 -18 Q 24 -28 18 -32 Q 12 -28 16 -18" fill="#d8ae48"/>
    </g>
    <!-- top right: lion -->
    <g transform="translate(1480, 120)">
      <circle cx="0" cy="0" r="24" stroke-width="1.5"/>
      <path d="M -10 4 Q 0 -10 10 4 Q 12 12 8 14 Q 0 12 -8 14 Q -12 12 -10 4 Z" fill="#d8ae48"/>
      <circle cx="-6" cy="0" r="2" fill="#d8ae48"/>
      <circle cx="6" cy="0" r="2" fill="#d8ae48"/>
    </g>
    <!-- bottom left: ox -->
    <g transform="translate(120, 780)">
      <circle cx="0" cy="0" r="24" stroke-width="1.5"/>
      <path d="M -12 -6 L 12 -6 L 12 2 L 6 10 L -6 10 L -12 2 Z" fill="#d8ae48"/>
      <circle cx="-4" cy="2" r="2" fill="#2a1a30"/>
      <circle cx="4" cy="2" r="2" fill="#2a1a30"/>
    </g>
    <!-- bottom right: eagle -->
    <g transform="translate(1480, 780)">
      <circle cx="0" cy="0" r="24" stroke-width="1.5"/>
      <path d="M 0 -16 L 10 -4 L 4 -2 L 0 6 L -4 -2 L -10 -4 Z" fill="#d8ae48"/>
      <path d="M -12 8 Q 0 4 12 8" fill="none" stroke="#d8ae48" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Greek key border frame -->
  <g fill="none" stroke="#d8ae48" stroke-width="0.8" opacity="0.4">
    <rect x="60" y="60" width="1480" height="780"/>
    <rect x="80" y="80" width="1440" height="740"/>
    <!-- top key pattern -->
    <path d="M 80 66 l 10 0 l 0 -6 l 6 0 l 0 6 l 10 0 l 0 6 l -26 0 Z"/>
  </g>

  <!-- TITLE: gilded manuscript style -->
  <g transform="translate(800, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="'Trajan Pro', 'Times New Roman', serif"
          font-size="42" letter-spacing="0.32em" fill="#e8c868" font-weight="700">SÉMILLON</text>
    <text x="0" y="30" text-anchor="middle" font-family="Georgia, serif"
          font-size="14" font-style="italic" letter-spacing="0.35em" fill="#d8ae48" opacity="0.7">SAUTERNES · BOTRYTIS CINEREA</text>
    <!-- decorative line -->
    <line x1="-120" y1="46" x2="120" y2="46" stroke="#d8ae48" stroke-width="0.6" opacity="0.5"/>
    <circle cx="0" cy="46" r="2" fill="#d8ae48" opacity="0.5"/>
  </g>

  <!-- bottom inscription -->
  <text x="800" y="820" text-anchor="middle" font-family="Georgia, serif"
        font-size="11" font-style="italic" letter-spacing="0.2em" fill="#d8ae48" opacity="0.5">or liquoreux · Château d'Yquem · MMXXVI</text>

  <!-- scattered gold dust -->
  <g fill="#e8c868" opacity="0.15">
    <circle cx="300" cy="250" r="1.5"/><circle cx="320" cy="270" r="1"/>
    <circle cx="600" cy="180" r="1"/><circle cx="630" cy="200" r="1.5"/>
    <circle cx="1050" cy="220" r="1"/><circle cx="1080" cy="240" r="1.5"/>
    <circle cx="1300" cy="280" r="1.5"/><circle cx="1330" cy="260" r="1"/>
    <circle cx="400" cy="650" r="1"/><circle cx="1200" cy="620" r="1.5"/>
    <circle cx="200" cy="450" r="1.5"/><circle cx="1400" cy="500" r="1"/>
  </g>
</svg>

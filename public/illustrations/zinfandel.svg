<svg role="img" aria-label="Zinfandel illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="zf-grain" patternUnits="userSpaceOnUse" width="3" height="3">
          <rect width="3" height="3" fill="#f0d488"/>
          <rect width="1" height="1" fill="#d8a858" opacity="0.4"/>
        </pattern>
      </defs>

      <!-- mustard yellow flat background -->
      <rect width="1600" height="900" fill="url(#zf-grain)"/>

      <!-- big stylized sun rays from horizon (flat colour) -->
      <g transform="translate(800, 600)">
        <g fill="#e84020">
          <polygon points="0,0 -640,-160 -700,-100"/>
          <polygon points="0,0 -560,-340 -600,-260"/>
          <polygon points="0,0 -380,-520 -440,-460"/>
          <polygon points="0,0 -120,-620 -200,-580"/>
          <polygon points="0,0 200,-580 120,-620"/>
          <polygon points="0,0 440,-460 380,-520"/>
          <polygon points="0,0 600,-260 560,-340"/>
          <polygon points="0,0 700,-100 640,-160"/>
        </g>
        <g fill="#c83020">
          <polygon points="0,0 -700,-100 -740,-30"/>
          <polygon points="0,0 -600,-260 -640,-160"/>
          <polygon points="0,0 -440,-460 -560,-340"/>
          <polygon points="0,0 -200,-580 -380,-520"/>
          <polygon points="0,0 380,-520 120,-620"/>
          <polygon points="0,0 200,-580 440,-460"/>
          <polygon points="0,0 560,-340 600,-260"/>
          <polygon points="0,0 640,-160 700,-100"/>
        </g>
      </g>

      <!-- horizon line: rolling hill silhouette in olive/navy -->
      <path d="M 0 600 
               C 200 580 360 620 540 600
               C 720 580 880 624 1080 600
               C 1260 580 1420 624 1600 604
               L 1600 900 L 0 900 Z" fill="#1a3848"/>
      <path d="M 0 660 
               C 240 642 480 680 720 660
               C 960 640 1200 680 1600 660
               L 1600 900 L 0 900 Z" fill="#0e2030"/>

      <!-- giant grape cluster centerpiece -->
      <g transform="translate(800, 480)">
        <!-- backing pyramid -->
        <g fill="#5a1820">
          <circle cx="0" cy="-80" r="36"/>
          <circle cx="-40" cy="-50" r="36"/>
          <circle cx="40" cy="-50" r="36"/>
          <circle cx="-80" cy="-20" r="36"/>
          <circle cx="0" cy="-20" r="36"/>
          <circle cx="80" cy="-20" r="36"/>
          <circle cx="-40" cy="10" r="36"/>
          <circle cx="40" cy="10" r="36"/>
          <circle cx="-80" cy="40" r="36"/>
          <circle cx="0" cy="40" r="36"/>
          <circle cx="80" cy="40" r="36"/>
          <circle cx="-40" cy="70" r="36"/>
          <circle cx="40" cy="70" r="36"/>
          <circle cx="0" cy="100" r="32"/>
        </g>
        <!-- highlights (flat) -->
        <g fill="#a83830" opacity="0.85">
          <circle cx="-10" cy="-90" r="10"/><circle cx="-50" cy="-60" r="10"/>
          <circle cx="30" cy="-60" r="10"/><circle cx="-90" cy="-30" r="10"/>
          <circle cx="-10" cy="-30" r="10"/><circle cx="70" cy="-30" r="10"/>
          <circle cx="-50" cy="0" r="10"/><circle cx="30" cy="0" r="10"/>
          <circle cx="-90" cy="30" r="10"/><circle cx="-10" cy="30" r="10"/>
          <circle cx="70" cy="30" r="10"/>
        </g>
        <!-- big leaf top -->
        <path d="M -10 -120 Q -90 -140 -100 -90 Q -60 -90 -40 -110 Q -20 -100 -10 -120 Z" fill="#4a6818"/>
        <path d="M 40 -130 Q 120 -140 130 -90 Q 90 -90 70 -110 Q 50 -110 40 -130 Z" fill="#4a6818"/>
        <!-- stem -->
        <line x1="10" y1="-120" x2="6" y2="-150" stroke="#4a6818" stroke-width="6"/>
      </g>

      <!-- title banner across top -->
      <rect x="80" y="60" width="1440" height="100" fill="#0e2030"/>
      <text x="800" y="130" text-anchor="middle"
            font-family="'Bebas Neue', 'Oswald', 'Arial Narrow', sans-serif"
            font-size="76" font-weight="900" letter-spacing="0.1em" fill="#f0d488">SONOMA · ZINFANDEL</text>

      <!-- bottom banner -->
      <rect x="80" y="780" width="1440" height="80" fill="#0e2030"/>
      <text x="800" y="836" text-anchor="middle"
            font-family="'Bebas Neue', 'Oswald', sans-serif"
            font-size="32" letter-spacing="0.4em" fill="#f0d488">★  CALIFORNIA SUNSHINE IN A BOTTLE  ★</text>

      <!-- side stripes (deco accents) -->
      <rect x="80" y="180" width="40" height="580" fill="#e84020"/>
      <rect x="1480" y="180" width="40" height="580" fill="#e84020"/>

      <!-- small WPA-style monogram bottom corners -->
      <g font-family="'Bebas Neue', 'Oswald', sans-serif" fill="#0e2030">
        <text x="160" y="746" font-size="20" letter-spacing="0.3em">EST. 1857</text>
        <text x="1440" y="746" text-anchor="end" font-size="20" letter-spacing="0.3em">OLD VINE</text>
      </g>
    </svg>

<svg role="img" aria-label="Longyan illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="ly-glaze" cx="50%" cy="40%" r="70%">
          <stop offset="0%" stop-color="#dce8d4"/>
          <stop offset="60%" stop-color="#b8ccba"/>
          <stop offset="100%" stop-color="#94ad9c"/>
        </radialGradient>
        <pattern id="ly-craze" patternUnits="userSpaceOnUse" width="80" height="80">
          <path d="M 8 0 L 14 22 L 32 28 L 28 50 L 50 60 L 56 80" 
                fill="none" stroke="#728a78" stroke-width="0.4" opacity="0.5"/>
          <path d="M 56 0 L 50 20 L 70 30" 
                fill="none" stroke="#728a78" stroke-width="0.4" opacity="0.5"/>
          <path d="M 0 50 L 20 56" fill="none" stroke="#728a78" stroke-width="0.4" opacity="0.5"/>
        </pattern>
      </defs>

      <!-- celadon glaze base -->
      <rect width="1600" height="900" fill="url(#ly-glaze)"/>

      <!-- crackle pattern overlay -->
      <rect width="1600" height="900" fill="url(#ly-craze)"/>

      <!-- a single circular plate centered (subtle deeper green) -->
      <circle cx="800" cy="450" r="340" fill="none" stroke="#8aa294" stroke-width="0.8" opacity="0.7"/>
      <circle cx="800" cy="450" r="320" fill="none" stroke="#8aa294" stroke-width="0.4" opacity="0.5"/>

      <!-- single incised chrysanthemum branch (very thin lines like incising in clay) -->
      <g fill="none" stroke="#5a7868" stroke-width="1.3" stroke-linecap="round">
        <!-- main stem -->
        <path d="M 620 720
                 C 660 600 700 480 760 380
                 C 800 320 820 280 860 240"/>
        <!-- side branch -->
        <path d="M 720 480 Q 800 460 880 480"/>
        <path d="M 680 580 Q 760 560 820 580"/>
        <!-- leaves: thin lobed -->
        <path d="M 720 480 Q 700 470 680 450 Q 700 442 720 458"/>
        <path d="M 700 510 Q 680 502 656 510 Q 670 526 700 524"/>
        <path d="M 680 580 Q 660 568 638 578 Q 656 596 682 590"/>
        <path d="M 740 380 Q 720 374 698 388 Q 716 402 744 392"/>
        <path d="M 770 320 Q 750 314 730 322 Q 744 336 768 332"/>
      </g>

      <!-- THE FLOWER: incised chrysanthemum -->
      <g transform="translate(860, 240)" fill="none" stroke="#5a7868" stroke-width="1.3" stroke-linecap="round">
        <!-- outer petals (16 around) -->
        <g>
          <ellipse cx="0" cy="-46" rx="6" ry="22"/>
          <g transform="rotate(22.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(45)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(67.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(90)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(112.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(135)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(157.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(180)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(202.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(225)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(247.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(270)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(292.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(315)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(337.5)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
        </g>
        <!-- inner petals smaller -->
        <g>
          <ellipse cx="0" cy="-24" rx="4" ry="12"/>
          <g transform="rotate(45)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(90)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(135)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(180)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(225)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(270)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
          <g transform="rotate(315)"><ellipse cx="0" cy="-24" rx="4" ry="12"/></g>
        </g>
        <!-- center button -->
        <circle r="6"/>
        <circle r="2.5"/>
      </g>

      <!-- second smaller chrysanthemum on branch -->
      <g transform="translate(620, 720) scale(0.6)" fill="none" stroke="#5a7868" stroke-width="2" stroke-linecap="round">
        <g>
          <ellipse cx="0" cy="-46" rx="6" ry="22"/>
          <g transform="rotate(45)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(90)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(135)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(180)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(225)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(270)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
          <g transform="rotate(315)"><ellipse cx="0" cy="-46" rx="6" ry="22"/></g>
        </g>
        <circle r="8"/>
      </g>

      <!-- subtle radial faint marks like wheel-thrown lines -->
      <g fill="none" stroke="#7a948a" stroke-width="0.3" opacity="0.4">
        <circle cx="800" cy="450" r="60"/>
        <circle cx="800" cy="450" r="120"/>
        <circle cx="800" cy="450" r="180"/>
        <circle cx="800" cy="450" r="240"/>
        <circle cx="800" cy="450" r="300"/>
      </g>

      <!-- minimal title bottom -->
      <text x="800" y="828" text-anchor="middle"
            font-family="'Songti SC', 'STSong', serif" font-size="22"
            letter-spacing="0.5em" fill="#3a4a40">龍 眼 · 懷 來</text>
    </svg>

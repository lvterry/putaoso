<svg role="img" aria-label="Mourvedre illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="mv-point" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="1" fill="#7a6850" opacity="0.35"/>
    </pattern>
    <pattern id="mv-point-green" patternUnits="userSpaceOnUse" width="5" height="5">
      <circle cx="2.5" cy="2.5" r="0.8" fill="#5a6848" opacity="0.35"/>
    </pattern>
    <pattern id="mv-point-blue" patternUnits="userSpaceOnUse" width="7" height="7">
      <circle cx="3.5" cy="3.5" r="1.2" fill="#4a6a78" opacity="0.3"/>
    </pattern>
    <pattern id="mv-point-smoke" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="4" cy="4" r="1.5" fill="#8a7868" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- warm ochre ground -->
  <rect width="1600" height="900" fill="#d8c8a8"/>

  <!-- SKY: pointillist dots -->
  <rect x="0" y="0" width="1600" height="380" fill="#b0a898"/>
  <rect x="0" y="0" width="1600" height="380" fill="url(#mv-point-blue)"/>

  <!-- sun (dense pointillist dot cluster) -->
  <circle cx="1200" cy="240" r="80" fill="#e8d098"/>
  <circle cx="1200" cy="240" r="80" fill="url(#mv-point)" opacity="0.5"/>
  <circle cx="1200" cy="240" r="60" fill="#f0dca8" opacity="0.6"/>
  <circle cx="1200" cy="240" r="60" fill="url(#mv-point)" opacity="0.3"/>

  <!-- DISTANT HILLS (pointillist) -->
  <path d="M 0 300 Q 200 270 400 290 T 800 280 T 1200 290 T 1600 280 L 1600 380 L 0 380 Z"
        fill="url(#mv-point-blue)"/>
  <path d="M 0 300 Q 200 270 400 290 T 800 280 T 1200 290 T 1600 280 L 1600 380 L 0 380 Z"
        fill="#8a8a78" opacity="0.25"/>

  <!-- MIDDLE HILLS (garrigue scrub) -->
  <path d="M 0 360 Q 300 320 600 350 T 1200 340 T 1600 350 L 1600 500 L 0 500 Z"
        fill="url(#mv-point-green)"/>
  <path d="M 0 360 Q 300 320 600 350 T 1200 340 T 1600 350 L 1600 500 L 0 500 Z"
        fill="#7a8a68" opacity="0.35"/>

  <!-- SMOKY HAZE (scattered dots, low density) -->
  <rect x="200" y="280" width="400" height="60" fill="url(#mv-point-smoke)" opacity="0.6"/>
  <rect x="800" y="300" width="500" height="40" fill="url(#mv-point-smoke)" opacity="0.4"/>

  <!-- FOREGROUND (rocky scrubland, garrigue texture) -->
  <path d="M 0 480 Q 200 450 400 470 T 800 460 T 1200 470 T 1600 460 L 1600 700 L 0 700 Z"
        fill="url(#mv-point)"/>
  <path d="M 0 480 Q 200 450 400 470 T 800 460 T 1200 470 T 1600 460 L 1600 700 L 0 700 Z"
        fill="#8a7a60" opacity="0.45"/>

  <!-- WILD GARRIGUE VEGETATION (pointillist textures) -->
  <g fill="#5a6848" opacity="0.7">
    <!-- shrubs -->
    <circle cx="200" cy="440" r="16"/><circle cx="215" cy="430" r="12"/>
    <circle cx="185" cy="435" r="10"/><circle cx="210" cy="450" r="10"/>
    <circle cx="500" cy="470" r="14"/><circle cx="515" cy="460" r="10"/>
    <circle cx="490" cy="458" r="10"/><circle cx="508" cy="478" r="8"/>
    <circle cx="900" cy="430" r="15"/><circle cx="915" cy="418" r="11"/>
    <circle cx="888" cy="420" r="10"/><circle cx="908" cy="440" r="9"/>
    <circle cx="1300" cy="460" r="13"/><circle cx="1315" cy="450" r="10"/>
    <circle cx="1290" cy="450" r="9"/><circle cx="1310" cy="472" r="8"/>
  </g>

  <!-- A WILD BOAR (pointillist version, made of dots) -->
  <g transform="translate(700, 560)">
    <!-- body (dense dot pattern) -->
    <g fill="#3a2a20">
      <!-- head -->
      <circle cx="-40" cy="-18" r="10"/><circle cx="-50" cy="-12" r="9"/>
      <circle cx="-56" cy="-6" r="8"/><circle cx="-60" cy="0" r="7"/>
      <circle cx="-55" cy="6" r="6"/><circle cx="-50" cy="10" r="5"/>
      <!-- snout -->
      <circle cx="-64" cy="4" r="5"/><circle cx="-68" cy="8" r="4"/>
      <circle cx="-66" cy="12" r="3"/><circle cx="-62" cy="14" r="4"/>
      <!-- body -->
      <circle cx="-30" cy="-20" r="11"/><circle cx="-20" cy="-24" r="12"/>
      <circle cx="-8" cy="-26" r="13"/><circle cx="6" cy="-28" r="13"/>
      <circle cx="20" cy="-28" r="13"/><circle cx="34" cy="-26" r="12"/>
      <circle cx="46" cy="-22" r="11"/><circle cx="56" cy="-16" r="10"/>
      <circle cx="62" cy="-8" r="9"/><circle cx="64" cy="0" r="8"/>
      <circle cx="62" cy="8" r="7"/><circle cx="56" cy="14" r="6"/>
      <!-- belly -->
      <circle cx="-20" cy="-8" r="10"/><circle cx="-8" cy="-6" r="12"/>
      <circle cx="6" cy="-6" r="12"/><circle cx="20" cy="-6" r="11"/>
      <circle cx="34" cy="-4" r="10"/><circle cx="46" cy="0" r="9"/>
      <!-- legs -->
      <circle cx="-30" cy="14" r="6"/><circle cx="-28" cy="24" r="5"/>
      <circle cx="-26" cy="34" r="4"/><circle cx="-32" cy="14" r="5"/>
      <circle cx="30" cy="16" r="6"/><circle cx="32" cy="26" r="5"/>
      <circle cx="34" cy="36" r="4"/><circle cx="26" cy="14" r="5"/>
    </g>
    <!-- ear -->
    <g fill="#3a2a20">
      <circle cx="-32" cy="-26" r="5"/><circle cx="-30" cy="-30" r="4"/>
      <circle cx="-28" cy="-34" r="3"/>
    </g>
    <!-- eye -->
    <circle cx="-50" cy="-14" r="2" fill="#d8c8a8"/>
    <!-- tusk -->
    <circle cx="-68" cy="10" r="2" fill="#d8c8a8"/>
    <circle cx="-70" cy="14" r="1.5" fill="#d8c8a8"/>
  </g>

  <!-- SMOKE/HAZE wisps (pointillist) -->
  <g fill="#8a7a68" opacity="0.2">
    <circle cx="400" cy="340" r="3"/><circle cx="420" cy="330" r="2.5"/>
    <circle cx="440" cy="325" r="2"/><circle cx="460" cy="330" r="2.5"/>
    <circle cx="1050" cy="320" r="2.5"/><circle cx="1070" cy="310" r="2"/>
    <circle cx="1090" cy="305" r="2.5"/><circle cx="1110" cy="315" r="2"/>
  </g>

  <!-- TITLE -->
  <text x="100" y="150" font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="56" font-weight="200" letter-spacing="0.12em" fill="#2a1a14">MOURVÈDRE</text>
  <text x="102" y="190" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" letter-spacing="0.4em" fill="#2a1a14" opacity="0.7">BANDOL · PROVENCE · GARRIGUE</text>

  <!-- bottom band (pointillist) -->
  <rect x="0" y="780" width="1600" height="120" fill="#3a2a20"/>
  <rect x="0" y="780" width="1600" height="120" fill="url(#mv-point)"/>
  <text x="100" y="838" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="500" letter-spacing="0.3em" fill="#d8c8a8">SAUVAGE · FUMÉE · CUIR · HERBES</text>
  <text x="1480" y="838" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" letter-spacing="0.2em" fill="#d8c8a8" opacity="0.6">BANDOL AOC · MMXXVI</text>

  <!-- sun's rays (pointillist lines) -->
  <g stroke="#e8d098" stroke-width="1" opacity="0.15">
    <line x1="1200" y1="240" x2="1500" y2="100"/>
    <line x1="1200" y1="240" x2="1450" y2="180"/>
    <line x1="1200" y1="240" x2="1500" y2="300"/>
    <line x1="1200" y1="240" x2="1000" y2="100"/>
    <line x1="1200" y1="240" x2="900" y2="140"/>
    <line x1="1200" y1="240" x2="950" y2="340"/>
  </g>
</svg>

<svg role="img" aria-label="Viognier illustration" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="vg-bg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f4d8c0"/>
          <stop offset="100%" stop-color="#e8b89c"/>
        </linearGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#vg-bg)"/>

      <!-- central oval frame -->
      <g transform="translate(800, 450)">
        <ellipse cx="0" cy="0" rx="380" ry="380" fill="#f4ead6" stroke="#a85838" stroke-width="3"/>
        <ellipse cx="0" cy="0" rx="368" ry="368" fill="none" stroke="#a85838" stroke-width="0.8"/>

        <!-- inner: stylized peach blossom -->
        <g>
          <!-- five overlapping petals -->
          <g fill="#f8c2a0" stroke="#a85838" stroke-width="2">
            <path d="M 0 -60 Q -80 -180 0 -240 Q 80 -180 0 -60 Z"/>
            <g transform="rotate(72)"><path d="M 0 -60 Q -80 -180 0 -240 Q 80 -180 0 -60 Z"/></g>
            <g transform="rotate(144)"><path d="M 0 -60 Q -80 -180 0 -240 Q 80 -180 0 -60 Z"/></g>
            <g transform="rotate(216)"><path d="M 0 -60 Q -80 -180 0 -240 Q 80 -180 0 -60 Z"/></g>
            <g transform="rotate(288)"><path d="M 0 -60 Q -80 -180 0 -240 Q 80 -180 0 -60 Z"/></g>
          </g>
          <!-- petal inner shading curves -->
          <g fill="none" stroke="#a85838" stroke-width="1">
            <path d="M -22 -100 Q -40 -160 -10 -210"/>
            <g transform="rotate(72)"><path d="M -22 -100 Q -40 -160 -10 -210"/></g>
            <g transform="rotate(144)"><path d="M -22 -100 Q -40 -160 -10 -210"/></g>
            <g transform="rotate(216)"><path d="M -22 -100 Q -40 -160 -10 -210"/></g>
            <g transform="rotate(288)"><path d="M -22 -100 Q -40 -160 -10 -210"/></g>
          </g>
          <!-- center stamens -->
          <g stroke="#a85838" stroke-width="1.4" fill="#f0a058" stroke-linecap="round">
            <line x1="0" y1="0" x2="-20" y2="-30"/>
            <circle cx="-20" cy="-30" r="4"/>
            <line x1="0" y1="0" x2="14" y2="-32"/>
            <circle cx="14" cy="-32" r="4"/>
            <line x1="0" y1="0" x2="28" y2="-12"/>
            <circle cx="28" cy="-12" r="4"/>
            <line x1="0" y1="0" x2="-26" y2="6"/>
            <circle cx="-26" cy="6" r="4"/>
            <line x1="0" y1="0" x2="-10" y2="32"/>
            <circle cx="-10" cy="32" r="4"/>
            <line x1="0" y1="0" x2="20" y2="20"/>
            <circle cx="20" cy="20" r="4"/>
          </g>
          <circle r="14" fill="#a85838"/>
        </g>
      </g>

      <!-- flanking Mucha-style whiplash curves -->
      <g fill="none" stroke="#a85838" stroke-width="2.5" stroke-linecap="round">
        <path d="M 200 100
                 C 280 200 200 360 300 440
                 C 380 510 280 660 360 800"/>
        <path d="M 1400 100
                 C 1320 200 1400 360 1300 440
                 C 1220 510 1320 660 1240 800"/>
      </g>

      <!-- decorative leaves along the curves -->
      <g fill="#a85838">
        <ellipse cx="230" cy="180" rx="20" ry="8" transform="rotate(-30 230 180)"/>
        <ellipse cx="240" cy="320" rx="22" ry="10" transform="rotate(20 240 320)"/>
        <ellipse cx="320" cy="500" rx="20" ry="9" transform="rotate(-15 320 500)"/>
        <ellipse cx="300" cy="660" rx="22" ry="10" transform="rotate(30 300 660)"/>
        <ellipse cx="1370" cy="180" rx="20" ry="8" transform="rotate(30 1370 180)"/>
        <ellipse cx="1360" cy="320" rx="22" ry="10" transform="rotate(-20 1360 320)"/>
        <ellipse cx="1280" cy="500" rx="20" ry="9" transform="rotate(15 1280 500)"/>
        <ellipse cx="1300" cy="660" rx="22" ry="10" transform="rotate(-30 1300 660)"/>
      </g>

      <!-- title arching over -->
      <path id="vg-titlepath" d="M 280 200 Q 800 60 1320 200" fill="none"/>
      <text font-family="'Cinzel', 'Trajan Pro', serif"
            font-size="44" font-weight="500" letter-spacing="0.3em" fill="#7a3018">
        <textPath href="#vg-titlepath" startOffset="50%" text-anchor="middle">VIOGNIER</textPath>
      </text>

      <!-- subtitle along bottom curve -->
      <path id="vg-subpath" d="M 280 760 Q 800 880 1320 760" fill="none"/>
      <text font-family="'Cinzel', Georgia, serif"
            font-size="18" font-style="italic" letter-spacing="0.35em" fill="#7a3018">
        <textPath href="#vg-subpath" startOffset="50%" text-anchor="middle">— flos persicae · condrieu —</textPath>
      </text>

      <!-- corner orbs -->
      <g fill="#7a3018">
        <circle cx="200" cy="100" r="8"/>
        <circle cx="1400" cy="100" r="8"/>
        <circle cx="360" cy="800" r="8"/>
        <circle cx="1240" cy="800" r="8"/>
      </g>
    </svg>
